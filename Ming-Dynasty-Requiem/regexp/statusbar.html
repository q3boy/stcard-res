```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>大明风华录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/GooYi-C/History@main/world_1629.js"></script>
<link
href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;900&display=swap"
rel="stylesheet"
>
<link href="https://testingcf.jsdelivr.net/gh/q3boy/stcard-res@6955afb/Ming-Dynasty-Requiem/regexp/statusbar.css" rel="stylesheet">
<!-- <script type="module"> -->
<script src="https://testingcf.jsdelivr.net/gh/q3boy/stcard-res@6955afb/Ming-Dynasty-Requiem/regexp/statusbar-min.js"></script>
</head>
<body>
<div class="da-yan-container" id="main-container">
<div id="bg-layer" class="bg-layer">&nbsp;</div>
<div class="scroll-content">
<header class="main-header">
<div id="user-name-display">{{user}}</div>
<div id="time-subtitle"></div>
</header>
<div class="main-tabs">
<button class="main-tab-btn active" data-target="tab-junjian">鈞鑒</button>
<button class="main-tab-btn" data-target="tab-assets">随身</button>
<button class="main-tab-btn" data-target="tab-household">内眷</button>
<button class="main-tab-btn" data-target="tab-relationships">人情</button>
<button class="main-tab-btn" data-target="tab-events">暗流</button>
<button class="main-tab-btn" data-target="tab-crossroads">歧路</button>
<button class="main-tab-btn" data-target="tab-map">舆图</button>
<button class="main-tab-btn" data-target="tab-plots">始末</button>
</div>
<div class="main-content-area">
<div class="tab-pane active" id="tab-junjian">
<div class="info-panel profile">
<h2 class="panel-title">鈞鑒</h2>
<div class="info-line">
<span class="info-label">
<svg
xmlns="http://www.w3.org/2000/svg"
width="24"
height="24"
viewBox="0 0 24 24"
fill="none"
stroke="#e3c193"
stroke-width="1.5"
stroke-linecap="round"
stroke-linejoin="round"
class="lucide lucide-circle-user-round-icon lucide-circle-user-round"
>
<path d="M18 20a6 6 0 0 0-12 0"/>
<circle cx="12" cy="10" r="4"/>
<circle cx="12" cy="12" r="10"/>
</svg>
&nbsp;身系何位:
</span>
<span class="info-value" id="val-identity"></span>
</div>
<div class="info-line">
<span class="info-label">
<svg
xmlns="http://www.w3.org/2000/svg"
width="24"
height="24"
viewBox="0 0 24 24"
fill="none"
stroke="#e3c193"
stroke-width="1.5"
stroke-linecap="round"
stroke-linejoin="round"
class="lucide lucide-tag-icon lucide-tag"
>
<path
d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"
/>
<circle cx="7.5" cy="7.5" r=".5" fill="currentColor"/>
</svg>
&nbsp;目下品题:
</span>
<span class="info-value" id="val-title"></span>
</div>
<div class="info-line">
<span class="info-label">
<svg
xmlns="http://www.w3.org/2000/svg"
width="24"
height="24"
viewBox="0 0 24 24"
fill="none"
stroke="#e3c193"
stroke-width="1.5"
stroke-linecap="round"
stroke-linejoin="round"
class="lucide lucide-message-circle-check-icon lucide-message-circle-check"
>
<path
d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719"
/>
<path d="m9 12 2 2 4-4"/>
</svg>
&nbsp;时誉所归:
</span>
<span class="info-value" id="val-reputation"></span>
</div>
<div class="info-line">
<span class="info-label">
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#e3c193" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"/><path d="M3.22 13H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/></svg>
&nbsp;气色虚实:
</span>
<span class="info-value" id="val-health"></span>
</div>
<div class="overview-section" style="margin-top: 15px; padding-top: 15px;">
<div class="overview-title">月支俸禄</div>
<div class="summary-grid">
<div class="summary-box">
<div class="summary-title">银钱</div>
<div class="summary-value income" id="val-salary-silver"></div>
</div>
<div class="summary-box">
<div class="summary-title">粮草</div>
<div class="summary-value income" id="val-salary-grain"></div>
</div>
</div>
<div class="summary-box" style="margin-top: 10px;">
<div class="summary-value" style="font-size:0.9em; font-weight:normal;" id="val-salary-desc"></div>
</div>
</div>
<div class="overview-section" style="margin-top: 15px; padding-top: 15px;">
<div class="overview-title">私库所藏</div>
<div class="summary-grid">
<div class="summary-box">
<div class="summary-title">内库私帑</div>
<div class="summary-value" id="val-priv-silver"></div>
</div>
<div class="summary-box">
<div class="summary-title">私蓄粮秣</div>
<div class="summary-value" id="val-priv-grain"></div>
</div>
</div>
<div class="summary-box" style="margin-top: 10px;">
<div class="summary-value" style="font-size:0.9em; font-weight:normal;" id="val-priv-desc"></div>
</div>
</div>
</div>
<div class="info-panel faction">
<h2 class="panel-title">赀粮甲马</h2>
<div class="faction-category collapsed">
<div class="faction-header">身家产业</div>
<div class="faction-content" id="list-industries"></div>
</div>
<div class="faction-category collapsed">
<div class="faction-header">部曲兵备</div>
<div class="faction-content" id="list-forces"></div>
</div>
<div class="overview-section">
<div class="overview-title">月计盈绌</div>
<div class="summary-grid full-width" style="margin-bottom: 10px;">
<div class="summary-box">
<div class="summary-title">进项银两</div>
<div class="summary-value income" id="val-sil-in"></div>
</div>
<div class="summary-box">
<div class="summary-title">支发银钱</div>
<div class="summary-value expense" id="val-sil-out"></div>
</div>
<div class="summary-box">
<div class="summary-title">截算余银</div>
<div class="summary-value" id="val-sil-net"></div>
</div>
<div class="summary-box">
<div class="summary-title">入仓籽粒</div>
<div class="summary-value income" id="val-grn-in"></div>
</div>
<div class="summary-box">
<div class="summary-title">糜费粮秣</div>
<div class="summary-value expense" id="val-grn-out"></div>
</div>
<div class="summary-box">
<div class="summary-title">积贮虚实</div>
<div class="summary-value" id="val-grn-net"></div>
</div>
</div>
<div class="summary-box">
<div class="summary-value" style="font-size:0.9em; font-weight:normal;" id="val-summary-desc"></div>
</div>
</div>
<div class="overview-section">
<div class="overview-title">府库所存</div>
<div class="summary-grid">
<div class="summary-box">
<div class="summary-title">公项余银</div>
<div class="summary-value" id="val-pub-silver"></div>
</div>
<div class="summary-box">
<div class="summary-title">积贮籽粒</div>
<div class="summary-value" id="val-pub-grain"></div>
</div>
</div>
<div class="summary-box" style="margin-top: 10px;">
<div class="summary-value" style="font-size:0.9em; font-weight:normal;" id="val-pub-desc"></div>
</div>
</div>
</div>
</div>
<div class="tab-pane" id="tab-assets">
<div class="info-panel assets">
<!-- <h2 class="panel-title">随身重器</h2> -->
<div class="assets-grid" id="list-assets"></div>
</div>
</div>
<div class="tab-pane" id="tab-household">
<div class="info-panel household">
<div class="household-list" id="list-household"></div>
</div>
</div>
<div class="tab-pane" id="tab-relationships">
<div class="info-panel relationships">
<div class="sub-tabs">
<button class="sub-tab-btn active" data-target="list-acquaintances">朝野故旧</button>
<button class="sub-tab-btn" data-target="list-lovers">红颜知己</button>
<button class="sub-tab-btn" data-target="list-subordinates">麾下僚属</button>
<button class="sub-tab-btn" data-target="list-family">亲属牵绊</button>
<button class="sub-tab-btn" data-target="list-deleted">销声匿迹</button>
</div>
<div class="sub-tab-pane active" id="list-acquaintances"></div>
<div class="sub-tab-pane" id="list-lovers"></div>
<div class="sub-tab-pane" id="list-subordinates"></div>
<div class="sub-tab-pane" id="list-family"></div>
<div class="sub-tab-pane" id="list-deleted"></div>
</div>
</div>
<div class="tab-pane" id="tab-events">
<div class="info-panel background-events">
<div id="list-events"></div>
</div>
</div>
<div class="tab-pane" id="tab-crossroads">
<div class="info-panel crossroads">
<div id="list-crossroads"></div>
</div>
</div>
<div class="tab-pane" id="tab-map">
<div class="info-panel map-panel-wrap">
<div id="map-subtitle" class="map-subtitle"></div>
<div class="map-wrapper">
<div id="map-container">
<div id="echarts-map"></div>
</div>
</div>
<div id="modal-overlay">
<div id="modal-scroll">
<div style="display:flex; height:100%; width:100%;">
<div id="modal-header">
<h1 id="modal-title"></h1>
<div class="modal-tab active" data-tab="info">信息</div>
<div class="modal-tab" data-tab="route">交通</div>
<div id="modal-seal"></div>
</div>
<div id="modal-text-container">
<div id="modal-panel-info" class="modal-panel active"></div>
<div id="modal-panel-route" class="modal-panel"></div>
</div>
</div>
</div>
</div>
</div>
</div>
<div class="tab-pane" id="tab-plots">
<div class="info-panel plots">
<div id="list-plots"></div>
</div>
</div>
</div>
</div>
</div>
<div id="confirm-modal-overlay">
<div class="confirm-modal">
<div class="confirm-modal-text">
确要<span id="confirm-target-action">舍弃</span> <span class="confirm-modal-name" id="confirm-target-name"></span>吗？
</div>
<div class="confirm-btn-group">
<button class="confirm-btn btn-cancel" id="btn-cancel-delete">暂缓</button>
<button class="confirm-btn btn-confirm" id="btn-confirm-delete">舍弃</button>
</div>
</div>
</div>
</body>
</html>
```
