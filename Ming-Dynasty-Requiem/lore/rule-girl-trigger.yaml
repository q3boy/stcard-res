艾弥斯:
  - 条件: "{{user}}已结识汤若望"
    说明: "结识汤若望"
    原因: "从汤若望处听闻{{user}}的名字，感到莫名的熟悉感（命定羁绊）"
    方式: "以助手身份来到{{user}}当前所在地，主动接触"
    回合: 3
  - 条件: '{{user}}路过或停留在宣武门" OR "{{user}}路过或停留在南堂'
    说明: "命定羁绊影响"
    原因: "对{{user}}有的莫名熟悉感（命定羁绊）"
    方式: "与{{user}}路边偶遇，主动上前搭话"
朱徽媞:
  - 条件: '与朱徽媞婚约未解除" AND "{{user}}身在京城'
    说明: "崇祯三年三月固定触发"
    原因: "打探{{user}}真实情况"
    方式: "在护卫与侍女的陪同下秘密来访"
    回合: 2
    前置:
      日期: [after, 3, 3]
  - 条件: '{{user}}路过或停留在公主府'
    说明: "公主府偶遇"
    原因: "路边偶遇，好奇打量"
    方式: "朱徽媞正好回府，在侍女的指点下掀起轿帘打量未来的夫婿"
顾眉:
  - 条件: True
    说明: "卓文茵拉拢"
    原因: "卓文茵为拉拢而赠送的侍妾"
    方式: "卓文茵亲自或差人送来在顾眉的卖身契与顾眉所居宅邸房契"
    回合: 2
    前置:
      人脉: [favor, 卓文茵, ">", 50]
卓文茵:
  - 条件: '{{user}} 商业天赋为京城商界所知" OR "{{user}}开始与晋商频繁接触（打压或合作均可）'
    说明: "与晋商接触"
    原因: "寻求商业合作"
    方式: "主动上门拜访"
    回合: 2
  - 条件: '{{user}}参加晋商聚会，展现出商业能力或潜力'
    说明: "晋商聚会主动结交"
    原因: "看重{{user}}能力"
    方式: "卓文茵主动在晋商聚会中结交"
  - 条件: '{{user}}发明或产出有商业价值的物品、技术'
    说明: "商业价值发现"
    原因: "看重{{user}}产出价值"
    方式: "卓文茵主动登门拜访，提出合作意向"
钱芷沅:
  - 条件: True
    说明: "{{user}}为钱谦益所喜"
    原因: "对{{user}}起了好奇之心，想了解能让父亲主动称赞的人是怎样的"
    方式: "钱谦益邀请{{user}}来钱府做客，钱谦益临时外出，钱芷沅在侍女陪同下主动接待"
    回合: 2
    前置:
      人脉:
        - every
        - [met, 钱谦益]
        - [favor, 钱谦益, ">", 50]
  - 条件: True
    说明: "{{user}}为钱谦益所厌"
    原因: "对{{user}}起了好奇之心，想了解能让父亲大发脾气的人是怎样的"
    方式: "街市偶遇，钱芷沅身边侍女指点她{{user}}的身份，钱芷沅主动攀谈"
    回合: 2
    前置:
      人脉:
        - every
        - [met, 钱谦益]
        - [favor, 钱谦益, "<=", -50]
  - 条件: '{{user}}凭借诗词在文人圈声名鹊起" OR "{{user}}因创作话本小说在市井坊间引起轰动'
    说明: "展露文才"
    原因: "对{{user}}的文才有好感"
    方式: "因仰慕文才，带着丫鬟一起主动登门求见"
    回合: 2
  - 条件: '{{user}}参加诗会，展现文才" OR "{{user}}在茶馆、酒楼给说书人提供话本稿件" OR "{{user}}在茶馆、酒楼说书'
    说明: "社交场合偶遇"
    原因: "钱芷沅对{{user}}的文才/话本、说书内容产生了兴趣"
    方式: "钱芷沅让随侍丫鬟主动邀请{{user}}交谈"
爱新觉罗·雅沁:
  - 条件: '剧情中皇太极/后金阵营企图拉拢{{user}}" OR "剧情中皇太极/后金阵营已将{{user}}视为潜在威胁或重要对手'
    说明: "皇太极的重视"
    原因: "为帮助后金而主动拉拢"
    方式: "前往{{user}}当前所在地，主动接近"
    回合: 3
  - 条件: '皇太极因{{user}}的行动身亡" OR "后金因{{user}}陷入夺权内乱'
    说明: "后金大乱，南下寻奇人"
    原因: "厌恶后金内部阿敏等人的夺权倾轧，对只手搅翻辽东局势的{{user}}产生极度强烈的好奇与征服欲"
    方式: "逃离关外，以一身烈性甚至带伤的姿态单骑闯入南朝，直接出现在{{user}}面前当面挑衅/质问"
    回合: 3
  - 条件: '{{user}}路过或停留在盛京" OR "{{user}}路过或停留在沈阳'
    说明: "纵马相识"
    原因: "街头纵马差点出事，幸好被{{user}}帮助拦截"
    方式: "勒马停在{{user}}面前，用皮鞭指着{{user}}，当街盘问底细"
博尔济吉特·乌云娜:
  - 条件: '林丹汗身死'
    说明: "林丹汗身死"
    原因: "林丹汗身死后来到{{user}}所在地散心，排解心头愁绪，路遇{{user}}，对其样貌有好感"
    方式: "主动上前搭话"
    回合: 3
    前置:
      日期: [after, 7, 7]
  - 条件: '剧情中林丹汗/察哈尔部企图拉拢{{user}}" OR "剧情中林丹汗/察哈尔部已将{{user}}视为潜在威胁或重要对手'
    说明: "林丹汗的重视"
    原因: "为帮助蒙古而主动来到{{user}}所在地"
    方式: "前往{{user}}当前所在地，主动接近"
    回合: 3
  - 条件: '{{user}}路过或停留在河套" OR "{{user}}路过或停留在归化'
    说明: "行路相撞"
    原因: "{{user}}行路无意间中与她相撞"
    方式: "拦住{{user}}，质问他为何挡路"
