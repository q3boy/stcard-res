- key: is_Adult
  剧情名: 冠礼大典
  触发器设置:
    触发: '提及{{user}}需要冠礼" OR "已进行冠礼筹备'
    完成: "{{user}}已正式行冠礼"
    完成负向: '未完成冠礼" OR "未获得表字'

- key: is_Fighting_Case_Resolved
  剧情名: 打驸马案
  触发器设置:
    触发: true # 默认触发
    完成: '打驸马案已被正式【判决结案】" OR "与赵承宗达成明确的【和解结论】" OR "赵承宗【下狱或伏法】" OR "赵承宗【明确表示】放弃拯救赵明德" OR "赵明德已【正式】认罪'
    完成负向: '打驸马案在审理中'

- key: is_Married
  剧情名: 大婚仪轨
  触发器设置:
    触发: '开始筹备大婚" OR "进行订婚/纳彩等前置环节" OR "大婚时间已不足一月'
    完成: 朱徽媞与{{user}}已完成【大婚仪轨】结为夫妻
    完成负向: '仅订婚/纳彩'

- key: is_Jin_Retreated
  剧情名: 后金退兵
  触发器设置:
    触发: 后金军结束对大明的袭扰和进犯，开始撤退
    完成: '后金军完全撤退" OR "后金军被败退" OR "后金军被击溃'
    完成负向: '仅有撤退意向" OR "未完成撤退'
    触发前置:
      时间: [before, 3, 5]

- key: is_Yuan_Dead
  剧情名: 袁督亡故
  触发器设置:
    触发: 袁崇焕已下诏狱
    完成: '袁崇焕被处决" OR "在剧情中确凿死亡" OR "袁崇焕摆脱死局'

- key: is_Brother_Forgiven
  剧情名: 兄弟释怀
  触发器设置:
    完成: 朱存烺与{{user}}达成实质性的【原谅与和解】
    完成负向: '仅沟通问题，未达成和解'

- key: is_Sister_Forgiven
  剧情名: 姐妹重拾
  触发器设置:
    触发: '顾眉或卓文茵谈及彼此" OR "两人之间发生冲突、争执、矛盾、暗斗'
    完成: 卓文茵与顾眉放下芥蒂达成【实质和解】
    完成负向: '仅沟通问题，未达成和解'
    触发前置:
      人脉: [met, every, 卓文茵, 顾眉]

- key: is_Gumei_As_Gift
  剧情名: 清音之礼
  触发器设置:
    完成: "{{user}}接受了顾眉作为礼物，并收入房中或外室"
    完成负向: '没接受或{{user}}没见到顾眉'
    触发前置:
      人脉: [met, 卓文茵]

- key: is_Inheritance_Fight_Resolved
  剧情名: 家产纷争
  触发器设置:
    触发: 田氏或 {{user}} 得知田仲和去世消息
    完成: '田氏与田仲常的遗产纠纷已【正式结束】" OR "遗产分配有明确结论" OR "田仲常已完全实现侵占遗产的目的'
    完成负向: '还在纠纷中，没有明确结论'
    触发前置:
      日期: [after, 3, 2]

- key: is_LinDan_Dead
  剧情名: 林丹汗故
  触发器设置:
    完成: 林丹汗被击杀或在剧情中确凿死亡
    完成负向: '仅被夺权、废黜、俘虏、囚禁'

- key: is_Jin_Civil_War
  剧情名: 后金内乱
  触发器设置:
    触发: 后金发生内乱
    完成: '后金内乱平息" OR "后金阵营被消灭、瓦解、征服'
    触发负向: 仅是内部矛盾，没有发生实质上的大范围内部战争

- key: is_HuangTaiji_Dead
  剧情名: 皇太极故
  触发器设置:
    完成: '皇太极被击杀、" OR "在剧情中确凿死亡'
    完成负向: '仅被夺权、废黜、俘虏、囚禁'
