- month: 崇祯二年·正月
  events:
    月内: 陕西地区大旱，灾情持续扩散。固原饥民由于粮饷被克扣，发生哗变，明末农民起义火种进一步蔓延
    二十一日: 崇祯帝在文华殿召见内阁辅臣，开始正式裁定“魏忠贤逆案”，此举标志着对阉党的大规模政治清算进入定案阶段
- month: 崇祯二年·二月
  events:
    月内: 皇长子朱慈烺出生（后册封为太子）
    十六日: 【国际】英国国王查理一世由于议会反对其征税政策，正式宣布解散议会。英国进入长达11年的“个人统治时期”（此举为日后英国资产阶级革命埋下伏笔）
- month: 崇祯二年·三月
  events:
    月内: 崇祯帝正式颁布《逆案》，入案者共255人，分别处以死刑、流放或革职，魏忠贤势力在朝堂上被基本肃清
    十九日: 崇祯帝正式颁布《逆案》，入案者共255人，分别处以死刑、流放或革职，魏忠贤势力在朝堂上被基本肃清
- month: 崇祯二年·四月
  events:
    月内: 后金皇太极在沈阳正式下令开科取士，选拔汉人知识分子，标志着后金政权开始向中原式的文官统治转型
    二十六日: 陕西籍官员马懋才上呈著名的《备陈大饥疏》，详尽描述了延安府民众采食蓬草、树皮，甚至“人相食”的惨状，恳请朝廷赈灾
- month: 崇祯二年·闰四月
  events:
    月内: 徐光启受命掌管历局，开始聘请耶稣会传教士龙华民、邓玉函等人，利用“西法”大规模修订历书
    二十九日: 【国际】丹麦国王与神圣罗马帝国皇帝签署《吕贝克和约》，丹麦战败并承诺退出德意志事务。三十年战争的丹麦阶段至此结束
- month: 崇祯二年·五月
  events:
    月内:
      - 户部尚书王永光奏请裁减驿站，以节省开支。这一政策直接导致大量驿卒失业（包括后来成为起义领袖的李自成）
      - 【国际】法国红衣主教黎塞留率军平定胡格诺派叛乱，签署《阿莱斯赦令》，强化了法国王室的中央集权
- month: 崇祯二年·六月
  events:
    月内: 蓟辽督师袁崇焕于皮岛诱捕并处死平辽总兵官毛文龙。此举导致东江镇哗变，关外牵制后金的力量遭到严重削弱
    初三日: 【国际】荷兰东印度公司旗舰“巴达维亚号”在澳大利亚西海岸触礁搁浅，随后引发了残忍的船员叛乱与屠杀
- month: 崇祯二年·七月
  events:
    月内: 陕西、山西地区饥荒加剧。朝廷虽下令赈济，但由于层层克扣，收效甚微。王嘉胤、王左挂等起义军势力在陕北迅速壮大
- month: 崇祯二年·八月
  events:
    月内: 后金皇太极察觉明军东江镇防线动摇，开始在沈阳集结主力，准备绕道蒙古长城关隘，避开宁锦防线，直接入关袭明
- month: 崇祯二年·九月
  events:
    月内:
      - 崇祯帝加封锦衣卫，加强特务统治，以应对国内日益动荡的局势和朝臣的党
      - 【国际】日本德川幕府进一步收紧“锁国令”，由于“紫衣事件”触发，后水尾天皇被迫让位于明正天皇
- month: 崇祯二年·十月
  events:
    月内: 己巳之变开始
    二十七日: 皇太极亲率十万大军，兵分三路突破长城大安口、龙井关等隘口。京师戒严，明廷震动
    三十日: 后金军攻陷遵化，直逼北京。袁崇焕得知消息后，率关宁铁骑星夜驰援北京
- month: 崇祯二年·冬月
  events:
    月内: 崇祯帝紧急起复孙承宗为兵部尚书兼中极殿大学士，负责保卫京师
    初四日: 山海关总兵赵率教在遵化与后金军激战，不幸战死，部下四千人全军覆没
    二十日: 袁崇焕部与后金军在广渠门外展开血战，明军成功阻击后金，但京郊遭到惨烈洗劫
- month: 崇祯二年·腊月
  events:
    月内: 崇祯帝受皇太极“反间计”影响，加之对毛文龙之死的积怨，下令在平台召见袁崇焕时将其当场逮捕入狱
    初二日: 关宁军见主帅被囚，深感心寒，在大将祖大寿带领下愤而东返，溃出关外，北京城防瞬间空虚
    十六日: 后金军在卢沟桥伏击明军援军，歼灭约1.5万人
    十七日: 永定门外大战，后金军大败明军。明将满桂、孙祖寿战死，黑云龙、麻登云被俘。后金军在北京城郊大肆劫掠而去
- month: 崇祯三年·正月
  events:
    月内:
      - 陕西等地饥荒持续，农民起义增多
      - 由于关宁军精锐大部在关内，后金军趁机袭击沈阳周边的明军残余据点，辽东局势进一步恶化
    初四日: 后金军在掠夺京畿后，皇太极率主力开始从通州向东撤退，但仍留重兵驻守遵化、永平、滦州、迁安四城（史称“截杀四城”），意图将其作为入主中原的桥头堡
    二十二日: 袁崇焕被下狱，审讯开始
- month: 崇祯三年·二月
  events:
    月内:
      - 立皇长子朱慈烺为皇太子，大赦
      - 陕西巡抚胡廷宴因无力镇压饥民起义被罢免，杨鹤接任。杨鹤提出“以抚为主”的策略，却因朝廷拿不出赈灾银两而埋下祸根
    初十日: 崇祯帝加封孙承宗为太傅，全面负责收复永平四城的军事调度
    十四日: 【国际】荷兰舰队69艘船抵达巴西伯南布哥
- month: 崇祯三年·三月
  events:
    月内:
      - 农民起义军入犯山西
      - 明廷因战争开支巨大，正式下令加派“辽饷”，百姓负担极度沉重，导致更多破产农民加入王嘉胤、王左挂等人的起义军
      - 【国际】英格兰与西班牙签署《马德里条约》，结束了维持五年的英西战争，欧洲列强开始将精力转向内部的三十年战争
    初九日: 【国际】1630年克里特地震发生
    二十二日: 【国际】第一部殖民地立法禁止赌博（波士顿）
- month: 崇祯三年·四月
  events:
    月内:
      - 礼部左侍郎徐光启三次上疏崇祯帝，拟调澳门葡人军队入京效力
      - 后金守将阿敏在滦州遭到明军红夷大炮猛烈轰击，压力剧增
    初五日: 孙承宗调度马世龙、吴自勉等部合围滦州
    初八日: 【国际】温思罗普舰队离开英格兰
- month: 崇祯三年·五月
  events:
    月内: 清兵东归，永平、迁安、遵化相继收复
    十一日: 明军收复滦州
    十二日: “永平屠城”。后金贝勒阿敏见守城无望，在撤退前下令将永平、迁安两城的降官及百姓全部屠杀，掠夺财宝人口出关。此举导致后金在汉人心中形象大损
    十四日: 孙承宗成功收复遵化、永平、滦州、迁安四城，京师之围彻底解除
    二十六日: 【国际】瑞典国王古斯塔夫二世率领瑞典军在波美拉尼亚登陆。三十年战争进入“瑞典阶段”，这位军事天才开始改变欧洲军事格局（与徐光启修历、引进火炮相呼应）
- month: 崇祯三年·六月
  events:
    月内:
      - 崇祯帝下诏嘉奖收复四城的功臣，但对袁崇焕的猜忌因阉党余孽的挑唆达到顶
      - 【国际】著名的“阿贝拉号”带着首批清教徒抵达北美，波士顿城在这一年建立，开启了大规模的北美的殖民时代
    十二日: 【国际】新阿姆斯特丹建立
    二十二日: 【国际】英国国王查理一世签署马萨诸塞湾殖民地宪章
- month: 崇祯三年·七月
  events:
    月内: 内阁发生剧变，首辅周延儒与次辅温体仁开始长期把持朝政，党争进入“周温时代”
    初三日: 陕西张献忠在米脂起义，号“八大王”。随后，李自成投奔其舅父高迎祥（闯王），明末两大起义巨头正式登上历史舞台
    初六日: 【国际】瑞典军队在三十年战争中干预
    十八日: 【国际】西班牙洗劫曼图亚
- month: 崇祯三年·八月
  events:
    月内: 明军名将曹文诏被派往陕西镇压义军，开始其“万人敌”的征战生涯
    十六日: 袁崇焕在北京西市被凌迟处死
- month: 崇祯三年·九月
  events:
    月内:
      - 后金加强政权建设
      - 皇太极在沈阳听闻袁崇焕死讯，大喜，进一步完善后金的文武官制度，准备筹建“天佑助威大将军”汉军火炮部队
      - 徐光启进呈《崇祯历书》部分卷目，并再次建议加强火器制造
- month: 崇祯三年·十月
  events:
    月内:
      - 巡抚延绥副都御史洪承畴、总兵官杜文焕败张献忠于清涧
      - 陕西民变进入高潮，王嘉胤自称“大将军”，起义军规模达到十余万人。杨鹤的“招抚”政策因粮饷不足宣告彻底失败
      - 【国际】法国爆发“愚人日”政变（Day of the Dupes），红衣主教黎塞留战胜太后玛丽·德·美第奇，完全掌握法国大权
    十三日: 【国际】雷根斯堡和约签署，曼图亚继承战争结束
    十七日: 【国际】日本女皇明正天皇加冕
- month: 崇祯三年·冬月
  events:
    月内: 崇祯帝因财政困窘，下令进一步精简机构，甚至动议裁撤部分边镇，导致边兵逃兵现象严重，许多人转而投奔起义军
    初三日: 【国际】第二次英格兰-波瓦坦战争结束
    初五日: 【国际】马德里条约
- month: 崇祯三年·腊月
  events:
    月内:
      - 加派“辽饷”
      - 明朝名将孙传庭此时正隐居乡间。与此同时，吴三桂因在收复四城及驰援京师表现出色，开始受到朝廷重视，升为都指挥
    初一日: 【国际】大古斯塔夫完成教育
    二十日: 【国际】叛乱的帝国军队袭击罗特韦尔镇
    二十九日: 除夕。崇祯帝在紫禁城内对镜感叹国事艰难。此时的大明，北有后金虎视眈眈，内有流寇遍地开花
- month: 崇祯四年·正月
  events:
    月内:
      - 崇祯帝赈济陕西灾民，确立对农民军实行以抚为主的政策。陕西等地饥荒严重，农民起义频发，朝廷试图通过安抚缓解叛乱，但效果有限，导致后续反
      - 由于辽东战事吃紧，崇祯帝加派“辽饷”，百姓负担进一步加重，导致更多流民加入起义军
    初一日: 大年初一，陕北起义军首领王嘉胤在山西、陕西交界处活跃，朝廷命洪承畴全力围剿
- month: 崇祯四年·二月
  events:
    月内:
      - 孙元化出任登莱巡抚，在登州大规模修筑城防，并聘请葡萄牙教官训练火器部队（这支部队当时拥有全亚洲最先进的红夷大炮技术）
      - 陕西农民起义军继续活跃，高迎祥、李自成等部在陕北地区活动，朝廷安抚政策未能完全遏止叛乱势头
      - 【国际】瑞典国王古斯塔夫二世与法国签署《巴尔华德条约》，瑞典获得法国资助，正式深度介入德意志三十年战争
- month: 崇祯四年·三月
  events:
    月内:
      - 陕北起义军“三十六营”在山西境内会盟，推举王嘉胤为盟主。李自成、张献忠等部均在其中，起义军由分散作战转为协同作战
      - 【国际】法国红衣主教黎塞留推动反哈布斯堡政策，支持新教势力
- month: 崇祯四年·四月
  events:
    月内:
      - 明将曹文诏在山西击败起义军，王嘉胤兵败南逃
      - 张存孟在陕北战败降明，洪承畴开始筹备围剿农民军
    十三日: 【国际】马格德堡大屠杀。神圣罗马帝国军队攻陷马格德堡，进行惨绝人寰的屠城，德意志地区人口锐减，战争进入极端残酷阶段。（公历5月20日）
- month: 崇祯四年·五月
  events:
    月内:
      - 总督洪承畴设下反间计，起义军内部发生内讧，首领王嘉胤被部下刺杀。起义军余部推举王自用为新盟主
      - 徐光启因主持修历及推行西式火器有功，升任礼部尚书
      - 陕西农民军溢出向河南等地蔓延，朝廷调兵应对
- month: 崇祯四年·六月
  events:
    初六日: 崇祯帝听取兵部尚书梁廷栋建议，命孙承宗在关外重筑大凌河城，企图恢复辽东防御体系。此举直接诱发了后金的大规模进攻
    二十六日: 常德大地震发生，震级约7级，波及湖南33州县及周边省份，荣王府倒塌，压死男女60余人，余震持续数年，造成严重破坏和人员伤亡
- month: 崇祯四年·七月
  events:
    月内:
      - 大凌河城接近完工。皇太极认为此城严重威胁沈阳安全，决定集结倾国之兵，发动灭此城之战
      - 【国际】瑞典军队在德国北部登陆，古斯塔夫二世率军南下
    二十七日: 后金军正式合围大凌河城，采取“围点打援”战术
- month: 崇祯四年·八月
  events:
    初六日: 大凌河之战全面爆发。祖大寿率精锐关宁军被困城中，后金军在城外挖掘五道深沟，切断一切补给
    初七日: 【国际】布赖滕费尔德战役。瑞典军队利用先进的线式战术和轻型火炮大败神圣罗马帝国军队，改变了欧洲军事史走向。（公历9月17日）
    十六日: 明廷派出的第一波援军在大凌河附近被后金击败
- month: 崇祯四年·九月
  events:
    月内: 大凌河城内断粮，出现“杀马而食”甚至“人相食”的惨状
    二十七日: 明朝监军张春率援军四万余人驰援大凌河，在小凌河遭到后金军伏击。后金首次大规模使用由汉人投降将领制造的“红夷大炮”，明军大败，张春被俘投降
- month: 崇祯四年·十月
  events:
    初七日: 皇太极派人交涉劝降，祖大寿迫于粮尽压力接受
    二十五日: 祖大寿眼见援军无望，满城枯骨，被迫向皇太极投降。大凌河城被拆毁
    二十八日: 祖大寿杀拒降部将何可纲，献城归顺后金，但随后借故返回锦州，继续为明效忠，此事件标志明清战争转折点。祖大寿以“回锦州做内应”为由骗取皇太极信任，带兵逃回锦州，此后虽复归大明，但关宁军元气大伤
- month: 崇祯四年·冬月
  events:
    月内:
      - 洪承畴正式接任陕西三边总督，变抚为剿，对农民军大开杀戒，陕西境内叛乱初步平息，但农民军向邻省溢出
      - 【国际】三十年战争中，瑞典军队推进，神圣罗马帝国军队遭受重创
    十四日: 登莱巡抚孙元化命部将孔有德率骑兵八百支援大凌河
    二十八日: 孔有德部行至山东吴桥，因天雨缺粮，士兵在当地偷了一只鸡被族长羞辱。在李九成的煽动下，孔有德正式发动兵变（史称“吴桥兵变”），转头攻打登州
- month: 崇祯四年·腊月
  events:
    月内:
      - 孔有德联络莱州等地的旧部，山东半岛陷入战火。这支拥有明朝最先进火炮、最精良火药和欧洲教官训练出的部队叛变，对明朝造成了毁灭性打击
      - 延安、庆阳大雪，民饥，盗贼益炽，饥荒加剧农民起义
      - 【国际】德川幕府进一步加强对天主教徒的搜捕，日本长崎的对外贸易限制愈发严格，海外贸易逐步进入“唐馆”与“出岛”时代
      - 【国际】英国议会通过法案，强化对殖民地的控制
- month: 崇祯五年·正月
  events:
    月内:
      - 祖大寿从后金返回锦州，皇太极派祖大寿回锦州劝降吴襄等将领，但祖大寿抵达后决定不降，自行坚守锦州城。此事涉及祖大寿及其家族，包括其子祖泽洪等先前在后金营中，后祖大寿的举动导致皇太极对明朝关宁防线产生更大压力
      - 皇太极在沈阳大赏入关有功将领，并继续完善“八旗制度”，强化对漠南蒙古的控制
    初三日: 【吴桥兵变】叛将孔有德、李九成率部攻陷登州（今山东蓬莱）。登莱巡抚孙元化自刎未遂被俘，明军苦心经营的火器基地失守，大量红夷大炮落入叛军之手。此事件涉及耿仲明、尚可喜等将领，后三人投降后金，形成汉军八旗的重要力量
    二十二日: 【国际】伽利略的名著《关于托勒密和哥白尼两大世界体系的对话》在佛罗伦萨出版，比较哥白尼和托勒密体系，主张地球绕太阳公转，引发科学界与教会的剧烈震荡，导致他被宗教裁判所审判
- month: 崇祯五年·二月
  events:
    月内:
      - 叛军孔有德部围攻莱州。明廷命总兵平阳节、张可大等率援军赶赴山东平乱
      - 农民起义军高迎祥、王自用等在山西活动，继续扩大势力。高迎祥作为农民军领袖，与张献忠、李自成等合作，涉及陕西、山西等地饥民起义，此年起义规模增大，对明廷造成持续威胁
    初三日: 【国际】伽利略的名著《关于托勒密和哥白尼两大世界体系的对话》在佛罗伦萨出版，引发科学界与教会的剧烈震荡。（本条与上月重复，已合并）
    初九日: 【国际】三十年战争中，蒂利伯爵率天主教联盟军在班贝格战役击败瑞典军队的古斯塔夫·霍恩伯爵，收复班贝格城。该战役涉及神圣罗马帝国皇帝斐迪南二世的支持，蒂利作为指挥官
- month: 崇祯五年·三月
  events:
    月内:
      - 山西境内起义军“三十六营”再度活跃，逐渐向河南境内转移。张献忠、李自成等部在晋豫边境声势日盛
      - 明廷继续应对后金威胁，孙承宗等建议加强关宁锦防线，但因大凌河之战余波，锦州防务吃紧。此月涉及祖大寿坚守锦州的事件后续，皇太极开始策划进一步进攻
    十二日: 【国际】三十年战争中，瑞典国王古斯塔夫二世在班贝格战役中击败神圣罗马帝国军队，新教同盟转入战略进攻。（本条与上条国际事件矛盾，存疑，暂按两条记录）
- month: 崇祯五年·四月
  events:
    月内:
      - 孙元化被押解回京入狱。朝廷内部党争激烈，言官纷纷弹劾孙元化“养奸贻患”
      - 陕西大饥荒持续，由于连年征调粮草，关中地区出现“民死过半”的惨状
      - 孔有德叛军开始围攻莱州城，耿仲明等加入，围困莱州知府朱万年等明军。该围攻持续数月，涉及炮轰城池和明军顽强抵抗
    十五日: 【国际】三十年战争中，瑞典国王古斯塔夫·阿道夫斯在莱恩战役击败天主教联盟的蒂利伯爵，蒂利于4月30日伤重而死。该战役标志着瑞典在战争中的转折，古斯塔夫作为新教领袖
- month: 崇祯五年·五月
  events:
    月内:
      - 后金军（清军前身）大举进攻察哈尔部林丹汗，林丹汗不敌西逃，后金势力由此延伸至黄河河套地区
      - 徐光启继续主持修历工作，使用西法编纂《崇祯历书》，涉及汤若望等耶稣会士。该事件前后持续至崇祯八年成书137卷，旨在改进明朝历法以准确预测日月食等天象
      - 【国际】泰姬陵在莫卧儿帝国首都阿格拉正式破土动工
- month: 崇祯五年·六月
  events:
    月内:
      - 崇祯帝下诏，要求各地严查“流寇”，并在晋豫两省增设巡
      - 京师大雨成灾，黄河在孟津决口，造成严重水灾，涉及河南等地民众流离失所。此灾加剧农民起义，崇祯帝下令赈济，但效果有限，涉及巡抚官员如马懋才的上奏
    初一日: 山东叛军孔有德再次猛攻莱州，明军死守。此时叛军开始修造由孙元化部下技师指导的先进火炮，明军伤亡惨重
- month: 崇祯五年·七月
  events:
    月内: 林丹汗战败逃亡后，大批蒙古部落向后金投降，明朝北境压力陡增
    二十三日: 明廷正式下令处死登莱巡抚孙元化。徐光启虽极力营救，但未能成功。明朝西洋火器研发事业遭受毁灭性打击
    二十五日: 【国际】瓦伦斯坦公爵率天主教联盟军重新占领布拉格。该事件涉及神圣罗马帝国斐迪南二世任命瓦伦斯坦为最高指挥官，标志着三十年战争的帝国阶段
- month: 崇祯五年·八月
  events:
    月内:
      - 洪承畴在甘泉击败农民军，白广恩降明。洪承畴作为延绥巡抚，率军与农民军交战，白广恩原为农民军首领，降后被明廷收编，此战暂缓陕西起义势头，但农民军继续转移
      - 【国际】荷兰东印度公司进一步确立在台湾的热兰遮城统治，开始加强对中国沿海贸易的抽税和控制
      - 【国际】郑芝龙在福建沿海大败海盗刘香，其海上霸权地位基本稳固，成为大明东南海域的实际掌控者
- month: 崇祯五年·九月
  events:
    月内:
      - 由于山东战事吃紧，明廷抽调大量原本防御农民军的精锐部队开往山东，导致河南、山西防线空虚
      - 徐光启因病及孙元化之死深受打击，开始称病，历书修撰工作进度放缓
    初三日: 【国际】纽伦堡战役，瓦伦斯坦公爵击败瑞典军队。该战役涉及三十年战争的胶着，古斯塔夫·阿道夫斯未能突破
- month: 崇祯五年·十月
  events:
    月内:
      - 叛军孔有德在莱州被关宁援军击败，开始向海上撤退，寻找出路。莱州围攻最终由耿如璧援军在十月解围，叛军败走投后金，此事件导致明朝辽东防线进一步削弱
      - 【国际】日本德川幕府发布第三次“锁国令”，严格禁止葡萄牙船只进入日本，并开始对天主教徒进行更大规模的清洗
    初九日: 【国际】【三十年战争·吕岑会战】瑞典国王古斯塔夫二世阵亡。尽管瑞典军获胜，但失去了被称为“北方雄狮”的统帅，欧洲战局进入相持阶段。该战役涉及瓦伦斯坦的指挥，标志着三十年战争瑞典阶段结束
- month: 崇祯五年·冬月
  events:
    月内: 明廷内部讨论加强辽东防务，但因财政困难和灾荒，难以实施。涉及崇祯帝的罪己诏等
    初五日: 由于河南巡抚处理不当，原本投降的起义军“神一魁”旧部再度反叛，中原局势全面失控
- month: 崇祯五年·闰冬月
  events:
    月内: 孔有德残部退至登州附近，开始向后金派遣使者，表达投降意图。大明最尖端的铸炮技术和教官即将流向沈阳
- month: 崇祯五年·腊月
  events:
    月内:
      - 全国灾荒加剧，陕西大雪，民饥，盗贼增多。涉及延安、庆阳等地人相食惨状，此年自然灾害与农民起义交织，推动明末乱局
      - 【国际】日本德川幕府发布第三次“锁国令”，严格禁止葡萄牙船只进入日本，并开始对天主教徒进行更大规模的清洗
    二十八日: 山西总兵曹文诏在河南大败农民军，但起义军采用“敌进我退”的游击战法，主力并未受损
- month: 崇祯六年·正月
  events:
    月内:
      - 曹文诏受命节制陕西、山西诸将，负责征讨农民军。他率领精锐部队，针对高迎祥、李自成等农民军首领的活动展开围剿，此前农民军已在陕西等地活跃多年，此举旨在平定西北动乱，但农民军机动性强，屡屡避开主力
      - 曹操（罗汝才）、闯王（高迎祥）等部在山西、河南边境与官军激战。明廷因连年战争，财政枯竭，崇祯帝多次下旨催督赋税
    初一日: 山西爆发大规模鼠疫（明末大鼠疫源头之一），此后数年间蔓延至京师，导致华北人口大量锐减
- month: 崇祯六年·二月
  events:
    初六日: 叛将孔有德、耿仲明在山东被官军围攻，走投无路之下，率部从登州出海，渡海向后金（皇太极）投降
    十一日: 农民军进入河北地区，参将杨遇春率兵追击，中伏身亡。农民军随后连陷赵州、西山、顺德、真定等地，又于邢台摩天岭西下，至武安击败左良玉军，守备曹鸣、主簿吴应科等阵亡。此事件源于农民军为避开明军主力而北上，造成河北多地动荡，明廷紧急调兵应对
    二十六日: 参将王之富、祖宽等率军克复登州水城。当时叛将孔有德等被围城中，粮草断绝，但依赖水城作为逃生之路。王之富等先夺取水城门外护墙，孔有德与耿仲明遂乘船逃遁。官军随后攻克水城，平定山东叛乱。此叛乱源于孔有德在崇祯五年起兵反明，历经数月围攻，明军最终收复失地，但孔有德逃脱后投降后金。影响：孔、耿二人带去了明朝最先进的红夷大炮技术和熟练炮手，后金火器实力从此反超明军
- month: 崇祯六年·三月
  events:
    月内:
      - 明末大鼠疫开始在山西传染，此前山西已遭旱灾和饥荒，鼠疫迅速蔓延，造成大量人口死亡，地方官员上报疫情，但朝廷应对不力，导致疫情向河北等地扩散，影响了后续农民军和明军的行动
      - 【国际】日本德川幕府发布第三次“锁国令”，严格限制对外贸易，禁止除特许船只外的一切外国船只进入
    初三日: 孔有德等抵达沈阳，皇太极亲出郊外十里迎接，并赐予高官厚禄，后金随后以此组建“乌真超哈”（重火器部队）
- month: 崇祯六年·四月
  events:
    月内:
      - 后金军在孔有德等人的协助下，利用火炮优势攻陷明军东江镇战略要地旅顺
      - 陕西大旱，延安、庆阳等地赤地千里，灾民纷纷加入义军，导致李自成、张献忠部势力剧增
      - 【国际】瑞典人和他们的德意志盟友在法国人的资助下成立了海尔布隆联盟，此联盟旨在对抗神圣罗马帝国的哈布斯堡王朝势力，标志着三十年战争进入新阶段，此前瑞典国王古斯塔夫二世阵亡，联盟继承其反帝政策
- month: 崇祯六年·五月
  events:
    月内:
      - 叛将孔有德及其党耿仲明等航海降清。他们携带大量火器和士兵投奔后金皇太极，此前孔有德在登州叛乱失败逃亡，此降清事件加强了后金的军事技术，后金因此获得明式火炮制造能力，对明朝边防构成更大威胁
      - 【国际】欧洲“三十年战争”激战正酣。瑞典军队在缺少了已故国王古斯塔夫二世的情况下，与神圣罗马帝国军队在德意志境内持续拉锯
    初八日: 崇祯帝免除首辅周延儒职务，由温体仁接任。温体仁此后长期把持朝政，朝内党争愈演愈烈
- month: 崇祯六年·六月
  events:
    初一日: 料罗湾海战序幕。荷兰东印度公司（VOC）台湾长官普特曼斯率领强大舰队，在未经宣战的情况下突袭厦门，击毁大批郑芝龙的商船和水师舰船
    二十二日: 【国际】罗马教廷正式宣判伽利略死刑（后改为终身软禁），强迫其放弃“日心说”
- month: 崇祯六年·七月
  events:
    月内:
      - 农民起义军“十三家”联军进犯河南。由于河南旱灾严重，饥民纷纷依附，义军规模达到数十万人
      - 郑芝龙与荷兰东印度公司在厦门爆发海战。荷兰台湾长官普特曼斯率8艘战舰突袭厦门港，击沉郑芝龙和明军二十余艘战船。此战前，郑芝龙刚追剿刘香返回，未及防备，明廷官员采取息事宁人态度，向荷兰人提供补给以求和解，但冲突未止
    初七日: 荷兰舰队与明朝叛逆海盗刘香结盟，封锁福建沿海，明廷下令福建巡抚邹维琏备战，郑芝龙倾尽家财重组水师
- month: 崇祯六年·八月
  events:
    月内:
      - 后金皇太极亲率大军第二次亲征征服蒙古林丹汗部，蒙古各部进一步臣服后金，明朝北疆侧翼完全暴露
      - 【国际】三十年战争中，瑞典联盟军于奥尔登多夫击败巴伐利亚将军布隆克霍斯特-格隆斯菲尔德领导的帝国军队，此战是海尔布隆联盟成立后的首次重大胜利，此前帝国军试图反击瑞典在德意志的扩张，此败进一步削弱哈布斯堡王朝的影响
- month: 崇祯六年·九月
  events:
    月内: 澎湖、金门之战爆发。荷兰长官普特曼斯与刘香在台湾大员汇合，准备进攻郑芝龙。福建巡抚邹维琏调集舟师，郑芝龙担任前锋，率军渡漳州海澄誓师出征。在澎湖遭遇战中，明军焚毁荷船1艘，生擒荷将1名，溺死荷兵数百。刘香败逃，普特曼斯退回台湾。此战延续料罗湾冲突，明军取得局部胜利
    二十日: 料罗湾海战决战。（公历10月22日）郑芝龙统领150余艘战船（含50艘巨型火炮舰），在金门料罗湾利用风向施放火船。明军大败荷兰与海盗联军，焚毁、击沉多艘荷军“盖伦”帆船。影响：此战确立了中国对东南沿海的制海权，荷兰东印度公司此后被迫每年向郑芝龙缴纳“养船费”才能入海贸易
- month: 崇祯六年·十月
  events:
    月内:
      - 崇祯帝下诏严厉申饬各省总督，要求限期肃清“流贼”。同年，陈奇瑜被任命为五省总督，开始筹备大规模“围剿”计
      - 料罗湾海战结束，明军大胜荷兰及刘香联军。郑芝龙联军击溃敌舰队，此战后荷兰影响力在福建沿海减弱，郑芝龙势力扩张，成为东南沿海主要海上力量，此前荷兰试图用武力迫使明朝开放贸易，但失败
- month: 崇祯六年·冬月
  events:
    月内:
      - 起义军突破官军防线，大规模渡过黄河，转战河南、湖广及安徽一带
      - 徐光启去世。他在临终前仍关心《崇祯历书》的编纂，此书是中西科技交流的巅峰之作
      - 郑芝龙在小埕击败刘香，刘香败遁粤东。此战是料罗湾海战余波，刘香作为海盗头目此前与荷兰勾结，此败后刘香势力衰落，明朝东南沿海暂时安定
- month: 崇祯六年·腊月
  events:
    月内:
      - 张献忠部攻陷安徽桐城，杀掠甚众。此时，大明王朝已陷入“北有后金、内有民变、南有海患（虽暂平）”的极端困境
      - 农民军连陷伊阳、卢氏，分兵犯南阳、汝宁，遂逼湖广。高迎祥、李自成等首领率军南下，此前他们在河南、陕西活动，此次进攻湖广地区，造成明廷调兵困难，农民军声势大振，预示着更大规模起义的到来
      - 【国际】伽利略在罗马接受宗教裁判所审判，被判终身监禁。此事件源于伽利略支持哥白尼日心说，此前教会多次警告，此审判标志着天主教会对科学观点的压制，影响了欧洲科学发展
- month: 崇祯七年·正月
  events:
    月内:
      - 起义军首领张献忠、罗汝才等率部由鄂西闯入四川，攻陷夔州（今奉节），四川局势开始糜烂
      - 【国际】沙俄军队在莫斯科保卫战中击败波兰军队，波兰立陶宛联邦被迫撤围
    初一日: 由于多年罕见的大旱与严寒，京师及北方各省出现大规模霜冻。崇祯帝在元旦朝贺仪式后，因忧心西北流寇，下诏罪己
- month: 崇祯七年·二月
  events:
    初三日: 崇祯帝提拔陈奇瑜为五省总督（陕西、山西、河南、湖广、四川），赋予其全权调度五省兵力讨伐流寇
    初五日: 农民军攻陷兴山，杀知县刘定国。农民军在老回回等领导下突破官军防线，攻占县城，处决地方官吏
    十五日: 农民军下瞿塘，继续推进，攻克峡口要塞
    十八日: 【国际】瓦伦斯坦被解除指挥权。神圣罗马帝国皇帝斐迪南二世怀疑其忠诚，下令解除其职务
    二十一日: 农民军攻下夔州府（今四川万源、宣汉、达县、梁平以东地区及湖北建始县）、大宁，围攻太平。由于土司秦良玉率军阻断了农民军前进的道路，农民军未能深入
    二十二日: 后金皇太极下令加强火器营（乌真超哈）建设，开始大规模仿制明军的红夷大炮，技术差距进一步缩小
    二十五日: 【国际】瓦伦斯坦被刺杀。帝国军官在埃格尔城堡刺杀瓦伦斯坦及其亲信
- month: 崇祯七年·三月
  events:
    月内:
      - 晋冀鲁豫四省大旱，赤地千里。陈奇瑜率精锐部队在汉中一带围剿流寇，高迎祥、李自成部被迫向兴安（今安康）溃退
      - 黄冈发生5级地震，造成房屋倒塌、民众伤亡。（公历3月26日）
      - 罗田发生5.5级地震，进一步破坏基础设施。（公历3月30日）
    初一日: 【国际】斯摩棱斯克战役结束，俄罗斯向波兰投降
    二十五日: 【国际】马里兰殖民地由英国移民在北美建立
- month: 崇祯七年·四月
  events:
    月内: 后金大军大举进攻察哈尔部。林丹汗不敌，率部众向青海方向败逃，蒙古帝国名义上的最后一位大汗走向末路
    初五日: 河南巡抚元默奏报，全省蝗灾严重，饥民相食，请求朝廷拨发内帑赈济，但被崇祯以军费紧张为由驳回
    初六日: 【国际】荷兰占领罗阿坦岛，从西班牙手中夺取
- month: 崇祯七年·五月
  events:
    月内:
      - 由于持续不雨，崇祯帝亲率百官到天坛祈雨，并下令“减膳撤乐”以示诚心
      - 尚可喜降后金。原明将尚可喜率部投降后金，皇太极优待之
    三十日: 【国际】波兰与沙俄签署《波利亚诺夫和约》，沙皇放弃对波兰王位的宣称，但沙俄通过此战赢得了喘息和扩张空间
    三十一日: 【国际】神圣罗马皇帝向黑森-卡塞尔宣战
- month: 崇祯七年·六月
  events:
    月内:
      - 陈奇瑜统率四路大军将高迎祥、李自成、张献忠等部主力数万人围困在兴安境内的车厢峡（一说在平利县）。由于连续暴雨四十余日，义军马匹病死，粮草断绝，陷入绝境
      - 李自成用重金贿赂陈奇瑜随从，并向陈奇瑜诈降，自愿罢兵归农
    二十二日: 【国际】博思韦尔盟约签署，苏格兰贵族反对查理一世宗教政策
- month: 崇祯七年·七月
  events:
    月内: 后金军分四路攻掠宣、大地区。攻灵邱，灵邱知县蒋秉采募兵坚守，守备世奇，把总陈彦武、马如豸，典史张标，教谕路登甫，并战死。城破后，知县蒋秉采自缢死，其家合门殉之
    初一日: 林丹汗在青海大草滩病逝。随后，他的妻儿及部众携带传国玉玺投降后金，皇太极成为蒙古名义上的共主
    初四日: 【国际】魁北克三河城建立。新法兰西殖民地扩展
    初八日: 后金军分路入关，攻入长城宣府、大同地区，进行大规模掳掠（即第二次入塞作战）。以明边将扰其境、杀其民、匿逃人为名，进围宣府。宣府守兵发炮击之，乃退走应州，兵掠大同，攻陷得胜堡
    二十九日: 【国际】库拉索岛被荷兰占领。从西班牙手中夺取
- month: 崇祯七年·八月
  events:
    月内: 陈奇瑜因“车厢峡误降”遭到朝廷弹劾。崇祯帝大怒，下旨将其逮捕入狱，并流放边疆。改任洪承畴兼督河南、山西、陕西、四川、湖广军务
    初三日: 皇太极亲率后金主力包围大同。明将曹文诏奋力抵抗
    二十七日: 【国际】诺德林根战役开始。天主教联军对阵新教瑞典-德国联军
- month: 崇祯七年·九月
  events:
    月内:
      - 李自成部攻入豫西，由于当地灾荒非常严重，大批饥民加入义军，起义规模迅速膨胀至数十万人
      - 朝廷设河南、山、陕、川、湖广五省总督负责镇压义军
      - 【国际】法国宰相黎塞留正式介入“三十年战争”的最后阶段，法军开始在莱茵河地区作战
    初五日: 后金军进攻应州（今山西应县），烧杀抢掠后带走数万人口及牲畜，随后由边口撤出长城
    初六日: 【国际】诺德林根战役，天主教联军大胜。瑞典军队溃败，损失上万
- month: 崇祯七年·十月
  events:
    月内: 崇祯帝下令修建北京城防工事，加强守城官兵的训练，并从澳门聘请葡萄牙技师测试新型火炮
    十一日: 【国际】布尔查迪洪水袭击北弗里西亚，淹没岛屿，数千人丧生
    二十二日: 明将左良玉在河南怀庆与流寇激战，虽然获胜，但流寇主力已散入豫山之中，难以根除
    二十七日: 湖广兵援汉中，被农民军击败，副总兵杨正芳及部将张士达战死。崇祯帝以农民军聚集陕西，下令河南兵入潼、华，四川兵由兴、汉，山西兵出蒲州、韩城，湖广兵入商、洛，合剿农民军
- month: 崇祯七年·冬月
  events:
    月内: 全国性大旱范围扩大。史料记载，此时陕西、山西多地“斗米千钱”，易子而食现象已成常态
    初十日: 皇太极在沈阳举行盛大集会，接受蒙古各部归降。后金政权正式决定更改族名为“满洲”
    十一日: 【国际】爱尔兰下议院通过“恩典”法案，向国王提供税收换取权益
- month: 崇祯七年·腊月
  events:
    月内:
      - 李自成、高迎祥部闯入河南汝阳，杀当地贪官，开仓放粮，深得饥民拥护，“迎闯王，不纳粮”的口号开始成雏形
      - 农民军高迎祥、李自成等部由陕东出终南山，进入河南，连克陈州，灵宝、汜水、荥阳等地，声势复震。陈奇瑜被逮后，洪承畴以兵部尚书受命兼摄陕、晋、楚、豫、川五省军务，准备更大规模地围剿农民军。崇祯帝急令洪承畴出关与山东巡抚朱大典合力围剿农民军
      - 【国际】德川幕府发布第三次“锁国令”，禁止日本船只出海，并严厉打击天主教，日本进入深度锁国期
    二十六日: 崇祯帝任命洪承畴正式负责西北围剿，洪承畴开始推行“以围代剿、步步为营”的策略
- month: 崇祯八年·正月
  events:
    月内: 【荥阳大会】（史料争议性存在，但民间叙事核心）：老回回、李自成、张献忠等“十三家七十二营”共二十余万人在河南荥阳集会。李自成提出“分兵定向”策略，义军由被动转为战略进攻
    十五日: 张献忠部利用守备空虚，奇袭明朝“中都”凤阳
    十八日: 【凤阳之变】张献忠攻陷凤阳，焚毁明朝皇陵（朱元璋祖坟），砍伐陵区松柏三十万株，火烧楼殿，杀留守太监及数万官民。此消息传至北京，崇祯帝“震悼，披发徒跣，改服哭庙”，明廷威严扫地
- month: 崇祯八年·二月
  events:
    月内: 崇祯帝因皇陵被焚下“罪己诏”，向天下臣民忏悔失政，并命各省官员“刷国耻”
    初十日: 宁夏官军因长期欠饷发生兵变，杀巡抚王楫。明廷西北防线出现巨大缺口
- month: 崇祯八年·三月
  events:
    月内:
      - 五省总督陈奇瑜因“车箱峡误放李自成”被弹劾罢官。明廷改任洪承畴出关，统领陕西、河南、山西、湖广、四川五省军务，全力围剿义军
      - 【国际】日本德川幕府颁布第三次《锁国令》，严禁日本人出海，并禁止海外日本人回国，违者处死
    二十一日: 后金天聪汗皇太极派遣贝勒多尔衮、岳托、萨哈廉、豪格率军远征察哈尔蒙古余部，搜捕林丹汗之子额哲于鄂尔多斯地区。（公历4月13日）
- month: 崇祯八年·四月
  events:
    月内:
      - 李自成部与官军在陕北安定作战，大败明总兵俞冲霄，起义军声势复振
      - 【国际】萨克森和勃兰登堡与神圣罗马帝国皇帝斐迪南二世签署《布拉格和约》，结束三十年战争中德国内战的部分方面
      - 【国际】【三十年战争】法国红衣主教黎塞留正式代表法国对哈布斯堡王朝宣战。这标志着欧洲战争由宗教冲突彻底转变为地缘政治的大混战
    二十九日: 明朝海军将领郑芝龙率领八十艘战船，在广东珠江口海域与海盗刘香展开决战。郑芝龙采用火攻战术，彻底击败刘香舰队，刘香战败自焚而死。（公历5月23日）
- month: 崇祯八年·五月
  events:
    月内: 李自成在米脂（其家乡）一带活动，当地民众响应者如云，号称“从乱如归”
    十九日: 察哈尔蒙古林丹汗之子额哲及其母苏泰太后向后金投降，献上伪造的传国玺。苏泰太后成为郑亲王济尔哈朗正妃。此事件标志着大蒙古国的正式灭亡，后金实现了对漠南蒙古的统一。（公历6月12日）
    三十日: 【国际】神圣罗马帝国皇帝斐迪南二世与德意志新教诸侯签署《布拉格和约》，但这并未能阻止战争，反而促使法国全面介入
- month: 崇祯八年·六月
  events:
    月内:
      - 【曹文诏战死】明末第一猛将、总兵曹文诏在真宁（今甘肃宁县）陷入义军重围。在力战不支后，曹文诏拔刀自刎。明廷痛失一员悍将
      - 皇太极正式废除女真族名，改称满洲。此改称旨在强化民族认同，巩固后金政权内部团结，并为建立大清帝国做准备
- month: 崇祯八年·七月
  events:
    月内:
      - 陕西再度发生大范围旱灾，赤地千里。饥民为了生存大量加入闯王高迎祥的部队
      - 【国际】哥萨克叛军领袖伊万·苏利马突袭波兰新建的科达克要塞，杀死驻守的200名雇佣兵。（公历8月3日）
    三十一日: 【国际】英王查理一世将皇家邮政服务向公众开放
- month: 崇祯八年·八月
  events:
    月内:
      - 崇祯帝调整剿饷策略，下令加派“匀输”，百姓负担进一步加
      - 明廷任命卢象升为“五省总理”，负责中原战事；洪承畴则专责西北，形成“洪卢协作”的南北夹击态势
- month: 崇祯八年·九月
  events:
    月内: 【传国玉玺事件】皇太极出征察哈尔蒙古，苏尼特部献上“传国玉玺”（相传为元朝丢掉的那块）。皇太极以此为“天命攸归”的预兆，开始筹备登基称帝
    十二日: 【国际】瑞典与波兰-立陶宛联邦签署《斯图姆斯多夫条约》（或称《什图姆斯多夫条约》），结束两国在波罗的海的争端
- month: 崇祯八年·十月
  events:
    初九日: 【国际】罗德岛创始人罗杰·威廉姆斯因宗教异见被马萨诸塞湾殖民地驱逐
    十三日: 【改族名满洲】皇太极正式下令，废除“女真”旧称，改族名为“满洲”。此事件与六月条重复，保留十月十三日具体日期记载
    二十八日: 崇祯帝颁布第一道罪己诏，公开承认皇陵被焚、民变四起是其责任。此与二月罪己诏为两次不同事件，予以保留
- month: 崇祯八年·冬月
  events:
    月内:
      - 李自成部试图趁黄河冰冻由韩城进入山西，但因该年冬暖河水未冻，且山西巡抚吴甡防守严密，入晋计划受阻
      - 【莽古济案】皇太极为了强化皇权，将胞姐莽古济凌迟处死，并处决了一批反对他的宗室将领
    二十二日: 【国际】荷兰开始对台湾原住民的绥靖战役（荷兰福尔摩沙绥靖战役）
- month: 崇祯八年·腊月
  events:
    月内: 高迎祥、张献忠三入河南，攻陷多座县城。卢象升率领“天雄军”星夜南下，双方在中原展开拉锯战
    二十三日: 【国际】印度莫卧儿帝国皇帝沙贾汗颁布诏令，反对葡萄牙耶稣会士，命令拆除阿格拉教堂，禁止他们向印度教徒和穆斯林传教
    二十四日: 崇祯帝二十五岁寿辰，但他却在焦虑中度过。这一年，明军虽在局部有胜果，但流寇已呈“野火燎原”之势，朝廷财政已近崩溃
- month: 崇祯九年·正月
  events:
    月内:
      - 明廷因连年战乱与灾荒，财政彻底枯竭。崇祯帝下旨再度加派“辽饷”，百姓负担达到极限
      - 农民起义军领袖高迎祥与李自成等部攻庐州，克含山、和州，杀知州黎宏业、在籍御史马如蛟等。随后围滁州，与明军卢象升、祖宽、罗岱、杨世恩等部激战于朱龙桥。高迎祥等北攻寿州不克，西入归德
    二十三日: 受陕西起义军影响，河南、湖广地区流寇复起
- month: 崇祯九年·二月
  events:
    月内: 山西大饥，人相食。饥荒导致民众流离失所，社会动荡加剧，许多人加入农民起义军。高迎祥与李自成分兵，由郧襄入兴安、汉中与张献忠会师
    初二日: 【国际】英格兰国王查理一世强制在全国征收“船税”（Ship Money），导致国内反对声浪高涨，为内战埋下伏笔
    初七日: 崇祯帝下诏，由于去年凤阳皇陵被张献忠焚毁，再次向天下臣民发布“罪己诏”
- month: 崇祯九年·三月
  events:
    月内:
      - 后金皇太极在盛京（沈阳）改组文馆为内三院（内国史院、内秘书院、内弘文院），模仿大明完善中央行政体制
      - 高迎祥攻密县、破登州，击杀明将汤九州，进军邓州、郧阳
    初三日: 【国际】罗得岛殖民地由罗杰·威廉姆斯在北美建立
    二十三日: 蒙古十六部首领齐聚盛京，共同推举皇太极作为“博格达彻辰汗”，漠南蒙古正式并入满洲版图
- month: 崇祯九年·四月
  events:
    月内: 【国际】法国正式与瑞典签署《维斯马条约》，法军主力直接干预三十年战争，全欧大战进入第四阶段
    十一日: 皇太极正式登基称帝，改国号为“大清”，改元崇德元年。定族名为“满洲”。（乙酉，大清立国）
    十二日: 大清册封五宫后妃。同日，因朝鲜使臣在典礼上拒绝下跪，清廷与其正式决裂，皇太极开始筹划“丙子胡乱”（侵略朝鲜）
- month: 崇祯九年·五月
  events:
    月内:
      - 清军阿济格部奉命率精锐绕过山海关，从长城龙井关、大安口入塞，开启了明末第三次清军大规模入关掠夺
      - 【国际】法国正式向神圣罗马帝国宣战，加入三十年战争
    初十日: 明将卢象升升任兵部侍郎，总督宣、大、山西军务，开始整顿北方防线
- month: 崇祯九年·六月
  events:
    月内: 【国际】西班牙军队利用法瑞联军调整空隙，大举入侵法国北部，一度推进至离巴黎仅数十英里的科比
    初一日: 清军攻占昌平，直抵北京城下，京师宣布戒严
    二十六日: 清军攻陷定兴，掠夺人口牲畜无数。明廷命高起潜、卢象升入援京师
- month: 崇祯九年·七月
  events:
    月内:
      - 高迎祥被押解至北京，崇祯帝下令将其凌迟处死。此后，李自成被部下推举为新一任“闯王”
      - 清军第三次入塞，阿济格率军56战皆捷，克16城，俘获人畜17万。宣大总督梁廷栋与兵部尚书张凤翼畏战，自服大黄求死
    十六日: “黑煞神”高迎祥被俘。陕西巡抚孙传庭在盩厔（今周至）黑水峪设伏，激战四昼夜，擒获第一代闯王高迎祥
- month: 崇祯九年·八月
  events:
    月内: 唐王朱聿键起兵勤王，意图援助朝廷对抗清军和农民起义，但被勒令还国，废为庶人
    初四日: 【国际】荷兰殖民者在台湾发动“麻豆社事件”后的后续清剿，加强了对台湾西南部平原的控制
    十六日: 清军阿济格部在入关掠夺三个月后，携带大量财物与数万俘虏，从容撤出边关。明军畏缩不敢阻击
- month: 崇祯九年·九月
  events:
    月内:
      - 崇祯帝对兵部尚书张凤翼、总督吴阿衡等人在清军入关期间的失职大为光火，张凤翼畏罪自
      - 农民起义军张献忠、罗汝才部进入四川，攻克大批州县
- month: 崇祯九年·十月
  events:
    月内: 李自成率余部潜入商洛山中，此时起义军处于低谷，仅存千余人
    初四日: 【国际】维特斯托克战役。瑞典军队在德意志东北部大败神圣罗马帝国联军，重新确立了新教势力在德意志地区的优势
    二十八日: 【国际】哈佛学院（后哈佛大学）由马萨诸塞湾殖民地在剑桥建立，是北美第一所高等学府
- month: 崇祯九年·冬月
  events:
    月内: 崇祯帝命杨嗣昌为兵部尚书，杨提出“四正六隅、十面张网”之策，意图彻底消灭关内起义军
- month: 崇祯九年·腊月
  events:
    月内:
      - 【国际】哈佛学院（哈佛大学前身）在北美马萨诸塞州正式成立
      - 【国际】日本加强锁国政策，限制外国贸易，仅允许荷兰和中国商人在长崎贸易
    初二日: 皇太极亲征朝鲜。清军十二万大军渡过鸭绿江，史称“丙子之役”。（丙子胡乱）
    十二日: 清军兵锋极速，仅用十天便进抵汉城（今首尔）郊外，朝鲜仁祖大王仓促逃往南汉山城
    十五日: 清军合围南汉山城。此时天寒地冻，城内粮草告罄
- month: 崇祯十年·正月
  events:
    月内:
      - 张献忠率部由湖广攻入四川，连破数城，四川巡抚王维章被革职
      - 陕西大旱持续，饥民起义增多，李自成领导的农民军在陕北与明军交战，屡遭挫败。明廷下令加紧剿匪，杨嗣昌开始筹划“十面埋伏”策略以围剿农民军
      - 【国际】神圣罗马帝国皇帝斐迪南三世即位，继承其父斐迪南二世，继续卷入三十年战争中，与法国和瑞典等国对抗
    初九日: 后金（清）军围攻朝鲜南汉山城。由于弹尽粮绝，朝鲜仁祖大王李倧被迫出城，向皇太极行“三跪九叩”之礼投降
    三十日: 【丁丑下城】朝鲜正式脱离明朝朝贡体系，转而臣服于清朝，清廷自此解除了侧翼威胁
- month: 崇祯十年·二月
  events:
    月内:
      - 皇太极由朝鲜凯旋还盛京（沈阳），开始筹划对大明的第五次大规模入关袭扰
      - 明朝兵部尚书杨嗣昌上疏提出“十面埋伏、四正六隅”剿匪方略，崇祯帝批准，杨嗣昌开始统领多省军务，旨在全面围剿李自成、张献忠等农民军领袖。杨嗣昌调集洪承畴、孙传庭等将领，集结重兵于陕甘豫鄂等地
      - 李自成农民军在陕北败于明将孙传庭，损失惨重，李自成率残部逃入商洛山中潜伏，农民起义进入低潮期
      - 【国际】法国红衣主教黎塞留加强对三十年战争的干预，支持新教诸侯对抗哈布斯堡王朝
    初三日: 崇祯帝在紫禁城内祭祀天地，由于近年灾荒不断，帝下《罪己诏》，哀悯黎民
- month: 崇祯十年·三月
  events:
    月内:
      - 内阁大学士杨嗣昌正式向崇祯帝呈递《四正六巡》方案，即“十面张网”战略。核心内容：以陕西、河南、湖广、江北为四正，四川、山西等为六巡，动员十万大军，增饷280万两
      - 明廷诏令各地加强城防，防范农民军余党。陕西延安府等地饥荒加剧，民众采食树皮，甚至出现人相食惨状，地方官员马懋才上奏朝廷求援
      - 张献忠农民军在四川活动，攻占夔州等地，明军左良玉部与之交战，张献忠暂避锋芒，转入山区
    二十三日: 著名地理学家、旅行家徐霞客在云南考察，记录了西南边陲的地理风貌与部族分布
    二十九日: 【国际】瑞典在三十年战争中击败萨克森军队于莱茵河战役，巩固了其在德意志的势力
- month: 崇祯十年·四月
  events:
    月内:
      - 崇祯帝下诏罪己，承认朝政失误，试图安抚人心。同时，加强对东江皮岛毛文龙余部的控制，但后金（清）压力增
      - 徐霞客继续西南游历，途经湖南、广西等地，记录地理风物
      - 【国际】英国国王查理一世试图推行宗教改革，引发苏格兰长老会不满，导致后来的英国内战酝酿
      - 【国际】英国爆发反抗查理一世强制推行《祈祷书》的骚乱，苏格兰人开始起义，这被视为英国革命的前奏
    初八日: 明廷正式下旨加派“剿饷”，用于支撑杨嗣昌的战略。此举加重了赋税，导致基层矛盾进一步激化
    二十二日: 清军将领阿吉格、石廷柱攻打明军皮岛（东江镇）
- month: 崇祯十年·闰四月
  events:
    月内: 李自成在关中遭遇孙传庭部狙击，被迫退往商洛山中休整
    初八日: 【皮岛陷落】清军在孔有德（原东江镇将领）的指引下，利用红夷大炮配合水师攻克皮岛，明军守将沈世魁战死。大明在敌后的最后一块战略跳板丧失
- month: 崇祯十年·五月
  events:
    月内:
      - 北京持续大旱，崇祯帝多次步祷祈雨，并下旨裁减宫廷用度以示诚意
      - 明朝在陕西增派军队，洪承畴率军围剿李自成残部，李自成在商洛山中艰难生存，招募饥民
      - 后金（清）内部整顿，皇太极加强中央集权，准备进一步南下
      - 【国际】笛卡尔出版《方法论》，奠定近代哲学基础，强调理性主义
    初九日: 皇太极在盛京举行盛大阅兵，展示从朝鲜掳掠的人口与财物
- month: 崇祯十年·六月
  events:
    月内: 【国际】荷兰爆发“郁金香泡沫”崩溃后的持续大萧条，由于国际贸易萎缩，间接导致流入大明的白银数量开始锐减
    初一日: 【科学巨著】宋应星的《天工开物》初版在江西出版。这本书详尽记录了明代农业、工业、采矿等手工业技术，被称为“中国17世纪的工艺百科全书”
    十八日: 徐霞客游历柳州，入住天妃庙，记录当地米粉习俗和自然景观，此为《徐霞客游记》中重要篇章，反映明末南方民生
    二十五日: 英国舰队队长约翰·威德尔率领四艘商船抵达澳门附近麦子山，试图与中国贸易，但遭澳门葡萄牙当局阻挠，后转往广州，引发中英首次海上冲突。威德尔舰队炮击虎门要塞，明军反击，事件导致英国暂时放弃直接贸易
    二十八日: 【国际】丹麦国王克里斯蒂安四世与神圣罗马帝国签署《吕贝克和约》，丹麦退出三十年战争，标志着战争丹麦阶段结束
- month: 崇祯十年·七月
  events:
    月内:
      - 张献忠在四川被明军名将秦良玉及各路大军包围，陷入苦战
      - 陕西等地蝗灾爆发，崇祯帝下令赈灾，但朝廷财政匮乏，赈济不力，加剧民变
      - 张献忠在夔州重组军队，袭击明军补给线，明将秦良玉率白杆兵与之对抗
      - 【国际】法国军队在三十年战争中推进，占领阿尔萨斯地区
    初九日: 杨嗣昌正式出任兵部尚书。他制定了“限期三月剿灭流寇”的死命令，调集猛将陈奇瑜、孙传庭、卢象昇、洪承畴从不同方向合围
- month: 崇祯十年·八月
  events:
    月内:
      - 由于灾荒叠加严苛的“剿饷”，山东、河南等地发生大规模逃荒，白骨盈野
      - 明廷调整边防，调吴三桂部加强山海关防务，防范清军入关
      - 李自成在商洛山中恢复元气，开始小规模袭击明军据点
      - 【国际】西班牙在加勒比海殖民地加强防御，对抗英国和荷兰海盗
    初三日: 著名史学家、思想家朱舜水在此期间忧虑国事，试图通过海外贸易筹集抗清经费
- month: 崇祯十年·九月
  events:
    月内:
      - 崇祯帝召见阁臣，讨论财政改革，试图征收新税以充军饷，但引发地方不
      - 清军在东北巩固统治，皇太极颁布新政，强化满汉融合
      - 【国际】日本德川幕府正式爆发“岛原之乱”，天草四郎率领数万基督徒农民起义，江户幕府大震
      - 【国际】日本幕府加强锁国政策，驱逐葡萄牙传教士，限制对外贸易
    二十二日: 明将孙传庭在渭南大败闯王部众。李自成部主力受损严重，开始向深山转移
- month: 崇祯十年·十月
  events:
    月内:
      - 杨嗣昌的“十面张网”初显成效。张献忠在湖北房县一带被明军左良玉部重创
      - 明朝在河南围剿农民军余党，孙传庭部取得小胜，但整体起义火种未灭
      - 徐霞客继续游历广西，记录喀斯特地貌
      - 【国际】英国议会与国王查理一世矛盾加剧，个人统治时期持续
    二十四日: 崇祯帝再次加官杨嗣昌，委以调度全国兵权之重任
- month: 崇祯十年·冬月
  events:
    月内:
      - 闯王李自成在南原（陕西渭南）陷入孙传庭与洪承畴的重围
      - 【南原大捷】李自成遭遇毁灭性打击，仅率刘宗敏等十八骑突围，潜伏进商洛山（此后李自成隐姓埋名，陷入了近两年的低迷期）
      - 陕西地震，延安府等地房屋倒塌，死伤众多，加剧灾荒
      - 张献忠转战湖北，袭击襄阳，明军熊文灿部追击
      - 【国际】荷兰东印度公司船只“巴达维亚号”事件余波，船上叛乱案审理
- month: 崇祯十年·腊月
  events:
    月内:
      - 皇太极以此为契机，命多尔衮、岳托等整备兵马，准备在次年初发动著名的“戊寅虏变”
      - 崇祯帝下诏求贤，试图改革弊政，但官僚体系腐朽，效果甚
      - 李自成在商洛山招募数千人，准备东山再起
    初一日: 由于大明军队主力被调往南方剿寇，北方九边防线空虚
    十一日: 【国际】日本岛原之乱爆发，天草四郎领导的天主教农民起义，反对幕府压迫，持续至次年，涉及数万起义者，最终被镇压
    二十日: 张献忠见大势已去，在湖北谷城向明将王嗣曾伪降，明廷内部对“受降”还是“彻底剿灭”产生剧烈分歧
- month: 崇祯十一年·正月
  events:
    十四日: 李自成等农民军领袖率部齐聚川北，洪承畴调集川陕明军设伏于梓潼。李自成军据险守川北，久粮乏，洪承畴以川师诱之，亲率陕兵设伏。李自成在梓潼被困，与洪承畴战不利，率余部走还陕西。此战导致农民军战死、饿死者众，李自成败后率军复入塞，赴岷州及西和、礼县山中
    二十一日: 【国际】荷兰东印度公司占领毛里求斯岛，作为通往东方的中转站，此举加强了荷兰在印度洋的殖民势力
    三十日: 清太宗皇太极第九子爱新觉罗·福临（即后来的顺治皇帝）出生于盛京
- month: 崇祯十一年·二月
  events:
    月内: 张献忠率部由黄梅入荆州，陷入明军重围
    初三日: 曹变蛟追剿李自成于西和、礼县山中，李自成等潜伏于山中不出，曹变蛟率军围剿，农民军无以得食，力不支
    二十八日: 【国际】日本“岛原之乱”被幕府军队彻底镇压，原城陷落，义军大败。此事件导致日本加强锁国政策，驱逐所有基督教国家势力；苏格兰反抗查理一世的《国民公约》在爱丁堡签署
- month: 崇祯十一年·三月
  events:
    月内:
      - 熊文灿对张献忠采取“诱降”政策。张献忠为保存实力，派人向明朝乞降
      - 【国际】三十年战争中，法国资助的雇佣军在莱茵费尔登战役中击败神圣罗马帝国军队
    初九日: 李自成率部从川入陕后，自洮州出番地，转战千里，与曹变蛟军连日苦战。番地人稀粮乏，导致农民军损失惨重
    十五日: 【国际】伽利略·伽利莱出版《关于两门新科学的谈话和数学证明》，这是世界上第一本材料力学著作，标志着近代物理学的开端，尽管伽利略对梁内应力分布的研究仍不成熟
- month: 崇祯十一年·四月
  events:
    月内: 皇太极在盛京举行大规模阅兵，筹划绕开山海关，从长城关隘再次突袭北京周边
    初八日: 【国际】瑞典殖民者在美国特拉华建立新瑞典殖民地，这是北美最早的瑞典殖民地
    二十日: 张献忠在湖北谷城正式投降明朝。虽然名义上归顺并改名“张忠义”，但拒不解散部队，仅接受名义上的改编，实为“借地养兵”
    二十六日: 张献忠伪降于谷城，接受明军招降，明兵部尚书熊文燦在湖北镇压农民起义时滥杀无辜，但张献忠暂降导致农民军势力一时低沉
- month: 崇祯十一年·五月
  events:
    月内: 兵部尚书杨嗣昌极力主张与清廷私下议和，以便集中兵力彻底消灭李自成。但此事遭到主战派大臣（如卢象昇）的激烈反对，崇祯帝态度摇摆不定
    十二日: 陕西等地饥荒持续，农民起义增多，明朝面临内忧外患
    十三日: 【国际】印度莫卧儿帝国皇帝沙贾汉开始在德里建造红堡
    二十日: 【国际】法国海军在三十年战争中击败西班牙海军，此战削弱了西班牙的海上帝位
- month: 崇祯十一年·六月
  events:
    月内: 李自成在陕西渭南、潼关南原遭遇洪承畴、孙传庭伏击，几乎全军覆没，仅率刘宗敏等18骑躲入商洛山中。明末大规模农民起义进入最低谷
    十八日: 两畿、山东等地大旱蝗灾，民大饥，明朝经济进一步恶化
- month: 崇祯十一年·七月
  events:
    月内: 朝廷因清军异动，命卢象昇进京协防。卢象昇在离任前悲愤上疏，直言“主和”必误国，与杨嗣昌彻底决裂
    十一日: 【国际】三十年战争中，神圣罗马帝国军队围困多勒城，城内出现人相食惨状
    二十四日: 皇太极加强清政权，准备入侵明朝
- month: 崇祯十一年·八月
  events:
    初二日: 皇太极命多尔衮与岳托分领左右翼兵南下攻明，清军第四次入塞，称为戊寅虏变。皇太极自领兵攻山海关外诸城，以牵制明军。（戊寅虏变开始）
    二十三日: 皇太极命睿亲王多尔衮为奉命大将军，岳托为扬武大将军，兵分两路大规模入关
    二十九日: 【国际】法国在三十年战争中继续支持新教势力对抗哈布斯堡王朝
- month: 崇祯十一年·九月
  events:
    初五日: 【国际】法国国王路易十四出生，他将成为法国历史上在位时间最长的君主，开启“太阳王”时代
    初九日: 清军入墙子岭、青山关攻进长城，蓟辽总督吴阿衡在密云战死。明京师戒严，宣大总督卢象升入援，受命督各路援兵
    二十二日: 清军左翼军突破墙子岭（今密云东北），右翼军突破青山关。蓟辽总督吴阿衡血战殉国
    二十八日: 清军进抵北京城下，京师戒严。崇祯帝急调宣、大、陕三镇精兵勤王
- month: 崇祯十一年·十月
  events:
    月内:
      - 卢象昇率援军抵达北京，被封为兵部尚书督天下援兵。然而杨嗣昌与监军太监高起潜将精锐分走，卢象昇手中仅存不足两万疲卒
      - 孙传庭、洪承畴奉命入京勤王。此举导致西北防务空虚，给商洛山中的李自成留下了喘息之机
    十五日: 洪承畴大破李自成于潼关南原，李自成军溃，死伤无数。李自成身受重伤，妻女、辎重俱失，仅与刘宗敏等七骑突围，匿于商洛山中。此战标志李自成部全军覆没，农民军势力低沉
    十七日: 【国际】荷兰海军在唐斯海战中击败西班牙海军主力，此战标志西班牙海军衰落
    二十一日: 清军由良乡抵达涿州，分三路南下：一路由涞水攻易州；一路由新城攻雄县；一路由定兴攻安肃。卢象升由涿州进据保定，命诸道援兵分道出击
- month: 崇祯十一年·冬月
  events:
    初九日: 清军围攻高阳。已告老还乡的前内阁首辅、一代名臣孙承宗率全家及百姓坚守三日，城破
    十一日: 孙承宗被擒杀，其全家四十余口同时殉国
    二十三日: 【国际】三十年战争中，法国军队在黎塞留命令下围攻德法边境的多勒，城内饥荒导致人相食
- month: 崇祯十一年·腊月
  events:
    月内: 清军南下山东，连陷济南府、青州府
    初一日: 清军一部进至巨鹿蒿水桥。卢象升率军五千人赴蒿水桥抗击，刚交战，总兵王朴引兵逃跑。卢象升督兵鏖战，炮尽矢绝，手持长剑，领兵众奋勇冲杀，斩杀清军数十人，最后不敌众，卢象升战死，所部除虎大威、杨国柱两将率少数突围外，其余全军覆没。（巨鹿悲歌）
    初七日: 【国际】日本加强锁国政策，限制外国贸易，驱逐所有西方势力
    十一日: 巨鹿之战（贾庄之战）爆发。数万清骑重围卢象昇。卢象昇身穿麻衣素服（为父服丧中），亲率亲兵与清军激战一昼夜
    十二日: 卢象昇力竭战死，终年39岁。随从亲兵无一投降。杨嗣昌事后甚至试图隐瞒其死讯，诬陷其临阵脱逃
    二十八日: 清军转战山西，复折而南，又攻入山东，下临清、会通河，连克山东州县
- month: 崇祯十二年·正月
  events:
    月内:
      - 崇祯帝朱由检为缓解关外战局和国内农民起义的压力，下令加派辽饷，全国田亩每亩加征九厘银两，导致民众负担加重，进一步激化社会矛盾。杨嗣昌作为首辅，推动此政策，但未能有效解决财政危
      - 后金（清）皇太极加强对蒙古部落的控制，继续巩固后方，为未来入关做准备。此前皇太极已于崇祯九年改国号为大清，此年继续推行新政
      - 杨嗣昌提出“限期剿平”中原起义军的计划，但由于清军在后方肆虐，明军精锐被调往京畿，导致对张献忠、罗汝才等人的监管出现真空
    初一日: 清军（多尔衮、岳托部）深入山东济南
    初二日: 济南陷落。清军攻破济南城，山东巡抚颜继祖撤逃，德王朱由枢被俘，城中守军及百姓惨遭屠杀，积尸数万
    十四日: 【国际】康涅狄格殖民地通过《基本法》，这是美洲殖民地第一个宪法，建立代议制政府，由温兹菲尔德、温莎和哈特福德的代表制定，影响了后来的美国宪法。（公历1月14日）
- month: 崇祯十二年·二月
  events:
    月内:
      - 张献忠在湖北谷城再次起义，此前崇祯十一年接受招安，但不满明廷待遇，重举义旗，率军转战湖广、四川等地，杀害地方官员，扩大势力范围，成为明末农民起义重要领袖之一
      - 由于济南失陷，崇祯帝大怒，下令逮捕山东巡抚颜继祖及一众失职将领（后多被处决）
    初十日: 清军在掠夺山东、直隶数月后，携带大量人口和牲畜开始从高阳、迁安一带撤出长城
    十八日: 【国际】在八十年战争中，荷兰海军与西班牙舰队在敦刻尔克附近海域交战，荷兰舰队12艘战舰对阵西班牙12艘盖伦船和8艘其他船只，西班牙舰队遭受重创，标志着荷兰在海上的优势。（公历2月18日）
    二十五日: 陕西延安等地饥荒加剧，民众流离失所，引发更多起义军活动，如李自成部在罗猴山集结，准备反击明军
- month: 崇祯十二年·三月
  events:
    月内:
      - 孙传庭因得罪首辅杨嗣昌，被弹劾下狱，削去官籍。此前孙传庭在剿灭农民军中屡立战功，但因与杨嗣昌政见不合，杨嗣昌借机报复，导致明军西北防线削弱
      - 傅宗龙、熊文灿等将领因作战不力被逮捕下狱，崇祯帝为整顿军纪而严惩，但此举进一步打击了明军士气
    初二日: 名将卢象升（此前在崇祯十一年底阵亡）的遗体终于被发现并收殓。其战死的真相（被杨嗣昌、高起潜坑害）在朝廷引发巨大震动，言官开始围攻杨嗣昌
    十三日: 【国际】哈佛大学正式命名，此前称为新学院，以纪念捐赠者约翰·哈佛，此校成为北美最早的高等教育机构，推动殖民地教育发展。（公历3月13日）
- month: 崇祯十二年·四月
  events:
    月内:
      - 明廷加派“练饷”七百三十万两。此时“辽饷”、“剿饷”、“练饷”三饷并征，全国百姓处于崩溃边缘
      - 李自成在谷城起义失败后，转战河南、陕西等地，重整旗鼓，与张献忠等部呼应，农民起义浪潮再度高涨，明廷调集重兵围剿，但效果有限
      - 清军继续蚕食明朝边境，皇太极命多尔衮等贝勒加强军事训练，准备更大规模入侵
    十四日: 【国际】在三十年战争中，瑞典军队在开姆尼茨战役中击败神圣罗马帝国军队，由约翰·班纳指挥，此胜延长了战争，并允许瑞典占领皮尔纳并推进到波希米亚
- month: 崇祯十二年·五月
  events:
    月内:
      - 崇祯帝命杨嗣昌以“督师”身份亲赴前线“围剿”起义
      - 陕西、河南等地爆发大规模旱灾和蝗灾，灾情严重，民众“人相食”，加剧农民起义，明廷赈灾不力，导致社会动荡进一步升级
      - 崇祯帝下诏罪己，承认治理失误，但未能有效扭转局
    初九日: 谷城叛变。此前假意投降的张献忠在湖北谷城再次起义，杀掉当地官员，焚毁投诚文书
    二十三日: 罗汝才等部在房县响应张献忠，起义军再次席卷荆襄
- month: 崇祯十二年·六月
  events:
    月内:
      - 李自成（此前潜伏于商洛山中）见张献忠起兵，率残部由汉南突出，进入河南。河南大旱，饥民纷纷加入，起义规模呈指数级增长
      - 张献忠部在湖广地区活动频繁，击败明军地方部队，扩大地盘，明廷派杨嗣昌督师剿匪，但策略失误
      - 【国际】日本德川幕府发布第五次“锁国令”，严禁葡萄牙船只进入日本，标志着日本锁国体制正式确立
    二十一日: 【国际】苏格兰人与英王查理一世签署《伯威克条约》，结束第一次主教战争，英王同意苏格兰长老会自治，但此条约仅是暂缓，第二年战争再起
- month: 崇祯十二年·七月
  events:
    月内:
      - 李自成部在河南南阳一带与明军交战，屡次得手，势力渐强
      - 清廷内部改革继续，皇太极加强中央集权，完善八旗制度
      - 杨嗣昌抵达襄阳，调集五省兵力试图围歼张献忠。但各将领各怀鬼胎，指挥失灵
      - 清太宗皇太极在盛京（沈阳）下令扩建锦州围困工事，为明年的“松锦大战”做战略准备
- month: 崇祯十二年·八月
  events:
    月内:
      - 【国际】英国东印度公司在印度建立马德拉斯（今金奈），购买当地土地作为贸易据点，此后发展为重要殖民城市
      - 明将左良玉在玛瑙山遭遇起义军伏击，虽有小胜，但主力损失严重
    十五日: 原本应是佳节，但华北地区发生罕见蝗灾，赤地千里。（中秋）
- month: 崇祯十二年·九月
  events:
    月内:
      - 张献忠攻占黄陂、蕲州等地，屠杀士民，显示起义军力量恢复
      - 崇祯帝在中极殿召见百官，哀叹国库空虚，要求宗室和大臣“助饷”，结果应者寥
      - 【国际】唐斯海战（Battle of the Downs）。荷兰海军击败西班牙“第二无敌舰队”，西班牙的海上霸权彻底瓦解
    二十五日: 【国际】铃木正三，日本武士僧侣，在禅宗中觉醒，推动日本佛教改革
- month: 崇祯十二年·十月
  events:
    月内:
      - 沙丘战役中，荷兰海军上将马滕·特龙普击败西班牙无敌舰队残部，由安东尼奥·德·奥昆多指挥，此战标志西班牙海军霸权衰落。（公历10月21日）
      - 清军小规模入侵明边境，测试明军防御
      - 张献忠利用杨嗣昌的“十面张网”战略漏洞，由湖北突入四川，如入无人之境
      - 【国际】英国苏格兰发生“主教战争”，苏格兰起义军反抗查理一世的宗教改革
- month: 崇祯十二年·冬月
  events:
    月内:
      - 李自成部在陕西继续活动，与明军周旋，避免决战
      - 明朝名将、辽东总兵祖大寿在锦州感到压力倍增，清军围城力度加大，锦州粮草告急
      - 徐光启去世后的《崇祯历书》基本在历局完成最后的校对工作
    二十四日: 【国际】英国天文学家耶利米·霍罗克斯和威廉·克拉布特里首次观测并记录金星凌日，使用开普勒方法预测，此事件帮助确定太阳系尺寸
- month: 崇祯十二年·腊月
  events:
    月内:
      - 崇祯帝为明年战局担忧，继续更换将领，但无济于
      - 杨嗣昌因围剿不力，忧惧交加，在襄阳病重，起义军则已发展至几十万人
      - 崇祯帝下诏，要求地方官员加强“保甲法”，严防饥民流入起义军，但因基层行政瘫痪，此令沦为空
      - 【国际】日本加强锁国政策，进一步限制外国贸易，仅允许荷兰和中国船只在长崎贸易，此政策持续至19世纪中叶
- month: 崇祯十三年·正月
  events:
    月内:
      - 陕西等地持续大旱，饥荒加剧，民众流离失所。延安、汉中等地灾民增多，地方官员上奏朝廷求援，崇祯帝下令地方巡抚马懋才等赈济，但因国库空虚，效果有限。此前崇祯十二年已现旱象，延续至今，导致农民起义频发，如李自成部在商洛山区养兵蓄锐，准备东出
      - 张献忠在四川境内反复拉锯，明将左良玉与张献忠在玛瑙山展开激战
      - 【国际】英王查理一世为了筹集对苏格兰战争的经费，决定结束11年的“个人统治”，筹备召开议会
    十五日: 崇祯帝在紫禁城内召见阁臣，讨论辽东边事。辽东巡抚方一藻上奏清军活动频繁，崇祯帝忧虑关宁锦防线，命兵部加强锦州等地防御。此前崇祯十二年清军已多次入塞，此年清军开始长围锦州，标志松锦大战序幕拉开
- month: 崇祯十三年·二月
  events:
    月内: 河南大旱初现，民众争食树皮草根。地方官吕维祺上奏描述灾情惨状，崇祯帝下罪己诏，承认治理失误，但未有效缓解。灾荒引发流民增多，为李自成入豫提供土壤
    初七日: 左良玉在玛瑙山大捷，大败张献忠。张献忠带残部潜入大巴山，此役本有机会彻底消灭张献忠，但左良玉因与上司贺人龙不和，故意放水
    二十日: 清军多罗贝勒多铎等率兵修筑义州城（今辽宁义县），作为围困锦州的据点。皇太极制定长围久困策略，避开明军强攻宁远、锦州的旧路。此举是清军第五次入塞的前奏，旨在切断明军补给
- month: 崇祯十三年·三月
  events:
    月内:
      - 崇祯帝下诏罢各镇内臣，旨在统一边务指挥。此前内臣监军导致事权不一，此诏由兵部尚书杨嗣昌推动，涉及总监、分守等宦官撤回京师。地方军务交由督抚镇道负责，但执行中仍遇阻
      - 清军（后金）开始大规模围攻锦州。皇太极采取“围点打援”战略，锦州守将祖大寿急报告急
      - 崇祯帝下诏催促蓟辽总督洪承畴率关内精锐入援辽东，松锦大战规模开始升
      - 江南初现水灾征兆，崇祯帝命户部加强监管，但灾情渐重，影响稻麦收成。此年江南大水，继而引发十四年旱蝗并发
    初八日至十三日: 【国际】锡兰加勒围城战，荷兰军队从葡萄牙手中夺取加勒要塞，控制锡兰战略要地。荷兰东印度公司加强在亚洲扩张，此战标志葡萄牙在印度洋影响力衰退
- month: 崇祯十三年·四月
  events:
    月内:
      - 陕西、河南蝗灾初发，崇祯帝命地方捕蝗，但灾情扩大。民众饥馑，人相食现象出现，加速农民军扩张
      - 清军在锦州外围修筑炮台，切断锦州与宁远的联系
    十三日: 【国际】英国“短期议会”开幕。由于议员拒绝先拨款后谈权利，该议会在三周后即被查理一世解散
    十五日: 崇祯帝告谕吏部，改革考选制度，破格用人。针对资格畛域抑坏人才，选教贡士并试过岁贡生263人，填补六部、都察院等司属缺额。此举旨在应对人才短缺，但因猜忌多疑，实际效果有限
- month: 崇祯十三年·五月
  events:
    月内:
      - 李自成率仅存的数十骑走出商洛山，进入河南。由于河南大饥，流民“如渴而饮”，李自成兵力在短短数月内暴增至数万人
      - 崇祯帝因财政枯竭，再次下旨加派“辽饷”，百姓负担达到极
    十二日: 【国际】加泰罗尼亚起义开始，反对西班牙国王腓力四世在东部西班牙的统治。此起义引发西班牙内部动荡，持续至1659年，削弱西班牙在欧洲霸权
    十六日: 崇祯帝告谕户部、都察院，描述直省告饥惨状。畿辅、山东、河南、山西、陕西百姓茹土食菜，甚至剜肉爨骨。崇祯帝感叹堕泪，下令赈济，但国库空虚，无法大规模实施
- month: 崇祯十三年·六月
  events:
    月内:
      - 全国旱灾加剧，崇祯十三年成为中国自汉代以来最严重干旱年。山东西部大旱，灾民扒树皮食，尸横遍野。朝廷赈济不力，社会动荡加剧
      - 清军加强围困锦州，明军洪承畴率援军对峙，但补给困难。皇太极亲督大军，实施围点打援战术，明军陷入被动
      - 大学士薛国观因被政敌举报贪腐及误导皇帝，被下狱论死（后赐自尽）。崇祯朝内阁首辅频繁更迭，政局极度动摇
      - 【国际】三十年战争期间，瑞典军队在德意志战场持续推进，哈布斯堡王朝压力倍增
- month: 崇祯十三年·七月
  events:
    月内:
      - 蝗灾蔓延河南、山西等地，崇祯帝命巡抚加强捕蝗，但无效。灾情导致“遍地皆贼”，农民起义四起
      - 明军在辽东战场小规模交锋，清军巩固义州据点，准备长期围困
      - 李自成在河南提出“均田免赋”口号，深得民心，并收纳饥饿的读书人牛金星、宋献策为谋士
    二十九日: 明军援锦先锋杨国柱在西石门与清军激战，中箭阵亡。吴三桂在此战中表现英勇，多次冲阵，名声大噪
- month: 崇祯十三年·八月
  events:
    月内:
      - 江南大水爆发，崇祯十三年江南遭大水，淹没农田无数。地方官上奏求援，崇祯帝命加强堤防，但灾后疫疾流行
      - 皇太极见明援军势大，亲自率大军从沈阳赶赴松山前线，并下令在半路筑红衣大炮阵地
    二十八日: 【国际】纽本战役，英格兰国王查理一世的军队败于苏格兰盟约派军队。此战是第二次主教战争关键一役，迫使查理一世同意停战，支付苏格兰占领费用
- month: 崇祯十三年·九月
  events:
    月内:
      - 李自成军在河南扩张，攻占多地。饥民响应，军队势如燎原。崇祯帝急调兵剿，但明军疲于应付清军，无法全力内剿
      - 清军围锦州进入僵持，明军粮道受阻，洪承畴求援朝廷
      - 陕西再度发生大地震，灾民流离失所。同时，北方地区爆发大规模“疙瘩瘟”（疑似鼠疫），京师人口锐减
      - 张献忠在四川休整后突然穿插进入湖北，焚毁襄阳
- month: 崇祯十三年·十月
  events:
    月内:
      - 清军第五次入塞，皇太极命济尔哈朗等率军绕道长城，入侵直隶、山东等地。明军防御薄弱，崇祯帝惊恐，急调勤王兵
      - 崇祯帝提拔陈新甲为兵部尚书。陈新甲主张“快战”，不断催促洪承畴出战，这违背了洪承畴“步步为营”的初衷，为后来的大败埋下祸
    二十六日: 【国际】里彭条约签订，结束英格兰与苏格兰之间战争。苏格兰军队占领北部英格兰，查理一世同意支付费用。此条约迫使查理召集长期议会，开启英国内战序幕
- month: 崇祯十三年·冬月
  events:
    月内:
      - 李自成军继续在河南活动，击败明军小股部队。崇祯帝命杨嗣昌统筹剿“贼”，但杨嗣昌主力在川，难以兼顾
      - 清军入塞掳掠，崇祯帝下诏罪己，承认“攘外安内”政策失误，但已无力扭转
    初三日: 【国际】英国“长期议会”正式开幕。这次议会一直存在到1653年，标志着英国资产阶级革命的正式开始
- month: 崇祯十三年·腊月
  events:
    月内:
      - 张献忠部逃出四川，偷袭襄阳，杀襄王朱翊铭。杨嗣昌闻讯自杀，此战重创明朝宗室，加速湖广动荡
      - 松锦前线进入严冬，双方转入僵持。明军13万精锐云集松山、杏山一带，粮草转运极度困难
    初一日: 【国际】葡萄牙恢复独立，结束60年西班牙统治。葡萄牙贵族起义，葡萄牙恢复战争持续至1668年，西班牙最终承认独立
    二十日: 李自成率军克洛阳，杀福王朱常洵。洛阳是河南重镇，此战标志李自成势力大增。此前李自成在河南赈饥，赢得民心，攻克洛阳后煮福王肉食，象征均贫富
- month: 崇祯十四年·正月
  events:
    月内:
      - 张献忠在四川与明军激战后，采取“声东击西”战术，由蜀入楚，奇袭荆襄地区
      - 张献忠东进，正月破明军于川东开县黄陵城，击败明总兵猛如虎，参将刘士杰战死，张献忠军开始疯狂东下，士气大振
      - 崇祯帝因福王遇害痛心疾首，下罪己诏“时事多艰，灾异叠见，痛自刻责，停今岁行刑，诸犯俱减”，并派驸马都尉冉兴让携内帑银两抚恤皇族后
    二十日: 李自成率起义军攻克洛阳，福王朱常洵被俘遇害（传言被烹为“福禄宴”）。此举标志着起义军由流寇转向正式动摇明朝藩王根基
    二十一日: 李自成在洛阳开仓赈贫，没收福王巨额家产分发给饥民，中原百姓“迎闯王，不纳粮”之声四起
- month: 崇祯十四年·二月
  events:
    月内:
      - 张献忠大破官军于太平县玛瑙山，总督陕西三边侍郎郑崇俭率军围攻，但张献忠突围败走归州，随后复振，继续在湖广一带活动
      - 【国际】葡萄牙宣布摆脱西班牙哈布斯堡王朝统治，正式恢复独立，若昂四世加冕为王（布拉干萨王朝开始）
    初三日: 李自成趁胜包围河南省城开封。周王朱恭枵散尽家财（出库金百万两招募壮士）激励守城，联合巡按御史高名衡坚守
    初五日: 张献忠伪装成明军守备，奇袭并攻克襄阳，杀襄王朱翊铭。至此，明朝在中原的两个战略重镇（洛阳、襄阳）相继沦陷，两名藩王丧命
    十九日: 李自成在开封城下被明军射中左目（一说射瞎），随后撤离围城，转战河南各地。此战明军陈永福背城而战杀义军二千，高谦驰援又杀七百
- month: 崇祯十四年·三月
  events:
    月内: 崇祯帝朱由检亲自到南郊祭天，祈求改变大明困局。但皇族在农民起义中屡遭屠戮，襄王朱翊铭和贵阳王朱常法被张献忠杀害，崇祯帝感叹皇族命运，决定加强河南抚恤
    初九日: 后金（清）皇太极增加红衣大炮数量，加紧围攻锦州。明军统帅祖大寿向朝廷发出告急文书，称“粮尽援绝”
    二十日: 崇祯帝下诏，命蓟辽总督洪承畴统领吴三桂、曹变蛟、王廷臣等八总兵，率精兵13万进关外，发动松锦大战以解锦州之围
- month: 崇祯十四年·四月
  events:
    月内:
      - 清军用红衣大炮轰毁杏山城垣。松锦外围防御体系开始松动
      - 清兵进攻锦州，祖大寿率军坚守。皇太极亲率清军围攻锦州，明廷紧急调兵，洪承畴奉命驰援。此战开启松锦大战序幕，明军主力开始集结，但后勤不济
      - 【国际】荷兰东印度公司正式占领马六甲，结束了葡萄牙人在该地区长达130年的殖民统治
    初七日: 张献忠、罗汝才合兵攻陷湖北随州，杀知州徐世淳及其全家
- month: 崇祯十四年·五月
  events:
    月内:
      - 张四知任内阁首辅（崇祯十四年五月代九月降）。张四知此前为礼部尚书，此任命旨在稳定朝局，但未能有效应对内外危机，明亡后降清
      - 周延儒复任内阁首辅（崇祯十四年五月）。周延儒此前因党争下台，此次复出试图调解东林党与阉党余孽，但政局仍乱
      - 明廷加派“练饷”，全国赋税沉重，加之严重的鼠疫在京畿地区和北方各省蔓延，人口大减
    初七日: 张献忠部攻克安徽庐州（今合肥），杀明兵备道蔡如蘅
- month: 崇祯十四年·六月
  events:
    月内:
      - 张献忠在巢湖训练水师。罗汝才因与张献忠不合，率部转投李自成
      - 两畿、山东、河南、浙江、湖广发生旱蝗灾害，山东寇起。灾情加剧饥民起义，崇祯帝多次下诏赈灾，但国库空虚，人相食现象频现
      - 【国际】日本德川幕府正式下令禁止葡萄牙船只进入日本，标志着“锁国政策”的彻底完善
- month: 崇祯十四年·七月
  events:
    月内:
      - 洪承畴驰援锦州，驻师松山。洪承畴为兵部尚书兼蓟辽总督，率13万明军出关，但行军缓慢，补给困难
      - 张献忠攻克郧西县，随后转战湖广与江西交界地带
      - 京师发生瘟疫，大批人口死亡，此疫为明末大鼠疫延续，崇祯十四年传到北京，造成户丁尽绝惨状
    二十六日: 洪承畴率领的13万明军进抵松山，与清军展开对峙。初期明军声势浩大，清军一度退避
- month: 崇祯十四年·八月
  events:
    月内: 明清松锦决战，明军大败。清军在皇太极指挥下围攻松山、杏山、塔山、锦州四城，明军主力13万大部被歼，洪承畴困守松山。此败导致明关外精锐尽失，关宁军瓦解，明朝国防崩盘
    十六日: 松锦大战关键节点。皇太极闻说明军势大，带病从盛京（沈阳）急行军，六天五夜赶到松山前线，并截断明军粮道
    二十一日: 明军粮道被断，由于主帅洪承畴与朝廷监军意见分歧，明军陷入混乱
    二十二日: 明军夜间突围演变为全线崩溃。王朴等总兵率先逃跑，吴三桂也随后撤回宁远。明军主力被清军围困于松山
- month: 崇祯十四年·九月
  events:
    月内:
      - 张献忠部屠项城、商水及扶沟。张献忠在河南活动，杀戮地方官员和士绅，加剧中原动乱
      - 由于北方战事惨烈，北京城内粮价飞涨，崇祯帝被迫下旨削减宫廷开支，甚至下罪己诏
      - 陕西明军围李自成于巴西鱼腹山中，李自成突围而去。此前李自成在河南复振，九月被围但成功逃脱，继续壮大
    初八日: 张献忠围困河南沈丘
- month: 崇祯十四年·十月
  events:
    月内:
      - 洪承畴及曹变蛟等残部被围困在松山城内，水源被切断，明军被迫杀马为食
      - 郑成功（时年18岁）奉父母之命，与礼部侍郎董先之女董友成婚。郑成功父郑芝龙为福建总兵，此婚事加强郑氏家族与明廷联系，次年生子郑经
    二十三日: 【国际】爱尔兰起义爆发，天主教徒反抗英格兰新教统治，趁英格兰总督斯特拉福回国及长期议会与查理一世斗争，驱逐新教徒家园，导致大屠杀和内战序幕
    二十五日: 张献忠主力攻入江西袁州（今宜春），南方局势进一步糜烂
- month: 崇祯十四年·冬月
  events:
    月内:
      - 李自成二次攻打河南项城，击败明军增援
      - 清军在松山城外修筑三层战壕，铁桶般围困洪承畴，明廷援军多次尝试突围均告失败
      - 南京地震。灾异频现，加剧明廷恐慌，崇祯帝多次修省自责
      - 杨嗣昌进军重庆。杨嗣昌为督师，追剿张献忠，但此前已因襄阳失守而忧惧，自杀于次年
      - 【国际】英国议会通过《大抗议书》，历数查理一世的暴政，英国内战一触即发
- month: 崇祯十四年·腊月
  events:
    月内:
      - 李自成自湖广进入河南，连克宜阳、永宁、偃师，军势大盛。饥民归附，李自成开始向中原腹地扩张
      - 两畿、山东、河南、山西、陕西旱灾蝗灾，人相食。此年灾荒持续，推动农民起义高潮
      - 徐光启去世后，其门人李天经继续主编的《崇祯历书》虽然已基本完成，但在大明战乱中难以全面推行
      - 【国际】荷兰攻占马六甲，从葡萄牙手中夺取，结束葡萄牙在东南亚的贸易垄断，荷属东印度公司控制海峡，影响亚洲贸易格局。（按公历时间归入1641年）
      - 【国际】三十年战争持续，瑞典军队在伦纳特·托尔斯滕松指挥下继续作战，1641年巴纳去世后托尔斯滕松接任，瑞典军在威悉河沿岸无效战役中突袭雷根斯堡帝国议会
    二十三日: 李自成率军第二次包围开封。此时李自成已拥兵数十万，号称“奉天倡义文武大元帅”
    二十五日: 清军在松山再次击败明军突围尝试。曹变蛟夜袭清营，几乎冲入皇太极中军帐，但最终因孤立无援失败
- month: 崇祯十五年·正月
  events:
    月内: 张献忠部在安徽、湖北一带流窜，攻陷舒城、六安，威胁长江防线
    初一日: 由于战事惨烈，崇祯帝取消了元旦朝贺。崇祯帝在新年之际，召见阁臣于乾清宫，揖拜群臣，重申振兴朝政的决心，试图扭转明朝颓势。此时，明朝面临内忧外患，李自成起义军势力渐强，清军威胁不断，崇祯帝多次罪己诏以求天佑
    十五日: 李自成在第二次围攻开封失败后撤军。虽然暂避锋芒，但闯军已基本控制河南广大农村
    二十日: 清军继续围攻松山，明军主帅洪承畴率部顽抗，但粮草断绝，形势危急。此前松锦大战已使明军损失惨重，祖大寿在锦州坚守，洪承畴亲率援军却遭清军重创，松山成为最后堡垒
- month: 崇祯十五年·二月
  events:
    初二日: 陕督汪乔年在襄城陷落后，被李自成部俘杀，死状极惨
    初八日: 李自成起义军在襄城大败明军，杀陕西总督汪乔年。汪乔年率军追击李自成部，却中伏，全军覆没，此战标志着李自成势力从河南向陕西扩展，明廷西北防线进一步崩溃
    十八日: 松山城陷落，明经略洪承畴被俘。副将夏承德暗通清军，接应清兵入城。明军名将曹变蛟、王廷臣突围失败，壮烈殉国。清皇太极亲督大军围攻松山数月，明军内无粮草，外无援兵，洪承畴最终降清。此事震动明廷，崇祯帝大怒，处死多名相关官员，松锦之败导致明朝关外防线尽失，清军控制辽东全境
    二十二日: 蓟辽总督洪承畴在松山被俘。消息传回京师，崇祯以为其已殉国，下令辍朝并亲自撰写祭文，准备隆重公祭
- month: 崇祯十五年·三月
  events:
    月内: 李自成改襄阳为襄京，自称“奉天倡义文武大元帅”，开始建立地方政权
    初一日: 【国际】乔治安娜（约克）成为美国第一个被正式注册的城市，标志着英国在北美殖民的早期扩张
    初八日: 锦州守将祖大寿在断粮数月、甚至出现“人相食”的绝境下，率部降清。至此，关宁锦防线彻底崩溃
    二十一日: 锦州城陷落，明将祖大寿降清。祖大寿坚守锦州一年有余，但松山失守后孤立无援，最终开城投降。清军由此完全控制松锦一线，明朝再无收复辽东的可能，崇祯帝闻讯痛哭，朝野震惊
- month: 崇祯十五年·四月
  events:
    月内:
      - 明廷与清秘密议和，兵部尚书陈新甲主持，但议和条件严苛，包括割地赔款。陈新甲试图通过议和缓解压力，但此事泄露后引发朝野反对，崇祯帝迫于压力处死陈新甲，议和失败
      - 【国际】汉尼拔·塞赫斯特被任命为挪威总督，加强丹麦-挪威联盟的管理
    初八日: 【国际】乔治·斯宾塞在新哈芬殖民地被处决，这是第一个在该殖民地被绞死的定居者，事件涉及道德和法律争议
    二十二日: 松锦大战正式宣告结束。皇太极班师回朝，大明精锐丧失殆尽
- month: 崇祯十五年·五月
  events:
    月内: 李自成起义军第三次围攻开封，明河南巡抚高名衡率军民顽抗。李自成采用围困战术，开封城内粮绝，人相食，形势危急。此前两次围攻均因明援军到来而失败，此次围攻持续数月，加剧河南灾荒
    初二日: 李自成率十万大军第三次围困开封。此次采取“围而不攻”战术，试图将开封彻底困死
    初四日: 被俘的洪承畴在清廷百般劝降下（一说由于皇太极解衣推食，一说由于庄妃劝降），正式剃发降清
    十八日: 【国际】维尔-玛丽（后来的蒙特利尔）由蒙特利尔圣母会领导的保罗·德·肖梅迪建立，这是法国在北美的重要据点，标志着法属加拿大殖民的开始
    十九日: 崇祯下令在京师斩杀松山弃城逃跑的总兵王朴，以儆效勇，但已无法挽回颓势
- month: 崇祯十五年·六月
  events:
    月内:
      - 开封围攻持续，明廷急调援军，但内部党争延误军机。李自成军挖掘地道攻城，开封军民掘井防御，双方僵持不下。河南大旱加剧，民众苦不堪言
      - 河南巡抚高名衡等固守开封。城内粮尽，百姓开始剥树皮、吃皮革，甚至公开易子而食
      - 【国际】法国红衣主教黎塞留继续巩固权力，支持新教势力对抗哈布斯堡王朝，推进三十年战争中的法国干预
      - 【国际】意大利物理学家、天文学家伽利略·伽利莱去世（公历1642年1月），科学界一代巨星陨落
- month: 崇祯十五年·七月
  events:
    月内:
      - 朱仙镇大败。丁启睿、左良玉等率领的援汴官军被李自成击溃，开封彻底沦为孤岛
      - 皇贵妃田氏病故。田贵妃深受崇祯帝宠爱，其逝世令崇祯帝悲痛欲绝，进一步影响其决策。田氏家族因其得势，但也引发朝臣不满
      - 【国际】英国国王查理一世解散议会，开始11年的个人统治时期，导致英国内部矛盾激化
    初一日: 明廷兵部尚书陈新甲与清廷秘密议和的消息走漏。崇祯为保全名声，将泄密的责任推给陈新甲
- month: 崇祯十五年·八月
  events:
    月内:
      - 崇祯下令将陈新甲处死。此举彻底断绝了明清议和的可能性，大明陷入两线作战的死
      - 陈新甲议和事泄，崇祯帝下令逮捕陈新甲并处死。议和本为权宜之计，但朝臣主战派强烈反对，导致明清关系进一步恶化
    十三日: 【国际】荷兰天文学家克里斯蒂安·惠更斯发现火星南极冰帽，这是天文学的重要发现
    十五日: 明军为阻李自成起义军，决开黄河大堤，开封城被洪水淹没，死伤数十万军民。李自成军亦遭重创，围攻失败。此“水淹开封”事件成为明末最大惨案之一，崇祯帝事后追责，但已无力回天
    二十二日: 【国际】英国内战爆发，保皇党与议会派开战，查理一世在诺丁汉竖起王旗，标志着第一次英国内战的开始
- month: 崇祯十五年·九月
  events:
    月内:
      - 吴又可完成《瘟疫论》，这是中国首部研究急性传染病的医学书籍。崇祯年间鼠疫流行，吴又可基于临床经验，提出“戾气”理论，对后世中医影响深远
      - 【国际】英国议会通过法案，限制国王权力，加剧内战紧张
    十五日: 连日暴雨，黄河水位暴涨。关于谁决的大堤，史学界众说纷纭（一说官军自决以水代兵，一说闯军决堤灌城）
    十六日: 黄河大堤决口，滔天洪水直冲开封
    十七日: 开封全城被淹没。昔日繁华的八朝古都沦为泽国，城内37万人仅余不到3万人幸存。周王朱恭枵在洪水漫上城头前，乘船侥幸逃脱
- month: 崇祯十五年·十月
  events:
    月内:
      - 清军大举入塞，绕过山海关，入关劫掠。清睿亲王多尔衮率军攻入山东，围攻青州等地，明军抵抗但损失惨重。此为清军第四次入关，明廷紧急调兵
      - 孙传庭率秦兵出关，虽然在初期小胜，但因粮草不济，被迫退守潼关
    二十日: 清军发动“壬午之变”。阿巴泰率清兵绕过山海关，从长城黄崖口入关，深入北直隶与山东，如入无人之境
    二十三日: 【国际】保皇党和议会军在埃奇希尔战役交锋，这是英国内战第一场大规模战役，双方均未获决定性胜利
- month: 崇祯十五年·冬月
  events:
    月内:
      - 清军攻陷兖州。俘虏并杀害了鲁王朱以派，清兵在山东境内疯狂烧杀抢掠，掳掠人口三十余万
      - 清军继续深入山东，围攻济南等地，明将李士元防守青州西北城墙，三日激战后城破。李士元战死，清军屠城，明朝地方防线进一步瓦解
      - 【国际】第二次布赖滕费尔德战役爆发，瑞典军队大败神圣罗马帝国军队，改变了三十年战争的均势
    二十四日: 【国际】荷兰探险家阿贝尔·塔斯曼首次发现范迪门地（塔斯马尼亚），这是欧洲人首次抵达该岛
- month: 崇祯十五年·腊月
  events:
    月内: 张献忠攻陷蕲州，杀明宗室
    初三日: 清军攻陷济南，济南王朱由枢被俘后自尽。清军在山东大肆劫掠，俘获人口数十万，明廷震惊，崇祯帝下罪己诏，但无力反击
    初八日: 孙传庭在陕西加紧练兵，崇祯多次下旨催促其出战，孙传庭感叹“此战必败，然君命不可违”
    十三日: 【国际】阿贝尔·塔斯曼首次看到新西兰南岛，最初称其为斯塔滕兰，后来改为新西兰
- month: 崇祯十六年·正月
  events:
    月内:
      - 【瘟疫爆发】正月下旬京师北京爆发大规模瘟疫，民众死亡众多，崇祯帝下令发帑银治疗，但效果有限，疫情从京城蔓延到周边地区，加剧社会动荡。御史报告称灾民遍野，人相食现象再现
      - 【国际】英国内战激战正酣，议会派军队在米德尔威奇战役中击败王室军
    初一日: 新年伊始，西北地区持续灾荒，陕西等地饥民起义频发。京师大疫，且伴有罕见天象。崇祯帝朱由检在北京忧心国事，多次召集大臣议论军饷和剿匪事宜，但朝廷财政空虚，无法有效应对
    十五日: 【国际】英国物理学家、天文学家艾萨克·牛顿出生于英格兰林肯郡伍尔索普村，其后成为近代科学奠基人，发明微积分、万有引力定律等，对世界科学影响深远。（公历1月4日）
    二十三日: 李自成攻克承天府（今湖北钟祥），这是明朝的三大直辖府之一
- month: 崇祯十六年·二月
  events:
    月内:
      - 清军（由多尔衮、阿巴泰率领）在关内持续劫掠，深入山东地区，攻陷登州、莱州
      - 张献忠部在湖广地区活动，攻克多座县城，杀害地方官员，抢掠粮饷，农民军内部矛盾显现，罗汝才部与李自成部发生摩擦
      - 【国际】张献忠在长江流域势力扩张，进逼武昌
    初一日: 陕西延安府等地饥荒持续，崇祯帝下令赈济，但地方官员贪腐，赈银多被截留，导致民变加剧。李自成部乘机进攻周边州县，俘获明军将领
    初五日: 【国际】西班牙王位继承问题引发欧洲紧张，哈布斯堡王朝内部矛盾加深，预示三十年战争进入新阶段。（公历3月）
    十五日: 京师瘟疫继续肆虐，崇祯帝亲自主持祈雨仪式，但无效果。朝廷内阁大学士周延儒等建议加派军饷，崇祯帝勉强同意，但引发朝臣争论
- month: 崇祯十六年·三月
  events:
    月内:
      - 崇祯帝提拔孙传庭为兵部尚书，督师陕西，这是明廷最后的军事指
      - 张献忠部在四川、湖广交界活动，击败明军地方部队，抢占粮仓，吸引更多饥民加入
      - 【国际】李自成在襄阳开科取士，任命各级官员，大明在长江中游的统治彻底瓦解
      - 【国际】著名的巴罗梅特（水银气压计）由意大利科学家托里拆利发明
    初一日: 李自成杀罗汝才，并其众，统一农民军力量，攻陷武冈，杀岷王朱企昪。此事件加强了李自成部的战斗力，农民军开始向长江中游推进
    十五日: 崇祯帝下令督师孙传庭集结陕西明军，准备反击李自成，但军中缺饷，士兵哗变频发，孙传庭上奏请求增援
    二十日: 【国际】法国红衣主教黎塞留巩固权力，支持新教势力对抗哈布斯堡王朝，三十年战争法国阶段拉开序幕。（公历4月）
- month: 崇祯十六年·四月
  events:
    月内:
      - 京师周边地震频发，民众恐慌，崇祯帝下令祈福，但灾异被视为天谴，朝野人心浮动
      - 【国际】黄河在马家口决堤，河南、山东灾情雪上加霜
    初一日: 崇祯帝在北京召见阁臣，讨论“攘外安内”策略，但后金（清）边患未除，农民起义又起，朝廷无力两顾
    十四日: 【国际】法国国王路易十三逝世，年仅五岁的路易十四即位（开启了法国历史上最长的统治期），马札兰摄政，影响欧洲格局。（公历5月14日）
    十五日: 李自成部继续北上，攻克多座关隘，明军节节败退。陕西总督孙传庭勉强维持防线，但士兵士气低落
- month: 崇祯十六年·五月
  events:
    月内: 李自成部在河南汝州歼灭明陕西总督孙传庭主力，孙传庭败退，农民军乘胜追击
    初一日: 张献忠部克武昌，杀楚王朱华奎，建立“大西”政权，自称大西王。他将楚王沉入长江，尽取王府积蓄，明朝宗室在南方遭遇毁灭性打击。此事件标志张献忠从流寇转为割据一方，控制湖广大片地区，严重削弱明朝长江防线
    初五日: 【国际】罗克鲁瓦战役爆发，法国军队击败西班牙精锐“大方阵”，标志三十年战争转折点，西班牙霸权衰落。（公历5月19日）
    十五日: 崇祯帝闻讯大怒，下令湖广总督何腾蛟集军反击，但明军内部腐败，无法有效组织
- month: 崇祯十六年·六月
  events:
    月内:
      - 陕西灾荒加剧，人相食现象普遍，李自成部利用民愤，扩大地盘
      - 【国际】由于京师鼠疫（北京大疫）爆发，死亡人数剧增，城防极度虚弱
      - 【国际】清军阿巴泰部携带大量掠夺的人畜、财宝从青山关出塞返回关外
    初一日: 【国际】英国议会内战加剧，查理一世与议会军队对抗，英国内战进入高潮。（公历7月）
    十五日: 崇祯帝在北京加强城防，担忧农民军逼近京师，下令加征赋税，但引发更多民怨
- month: 崇祯十六年·七月
  events:
    月内:
      - 崇祯帝严令孙传庭出关击贼。孙传庭深知兵力未精、粮草不足，上疏乞求延期，崇祯不许，斥其“畏缩
      - 张献忠部从武昌移师，向西扩张，威胁四川
    初一日: 李自成部继续推进，攻克多座城池，明军溃败
    初九日: 【国际】三十年战争中，瑞典军队继续在德国作战，欧洲各国疲于战争。（公历8月）
    十五日: 崇祯帝急召孙传庭回京议事，但孙传庭上奏称军中缺粮，无法出战
    二十四日: 张献忠大军攻克重庆，四川战局全面恶化
- month: 崇祯十六年·八月
  events:
    月内:
      - 满清多尔衮与代善达成妥协，拥立皇太极九子福临即位（顺治帝），多尔衮、济尔哈朗辅政
      - 李自成部在河南集结，准备进攻西安
    初一日: 【国际】英国内战中，议会军队在马斯顿荒原战役获胜，查理一世势力削弱。（公历9月）
    初九日: 【皇太极逝世】清太宗皇太极在盛京（沈阳）猝死，年五十二岁。其子福临继位，即顺治帝，多尔衮摄政。此事件导致清朝内部短暂动荡，但多尔衮迅速稳定局面，准备入关
    初十日: 孙传庭被迫在粮草未具的情况下，率明军主力誓师出关，踏上不归路
    十五日: 崇祯帝闻讯清朝内变，试图利用机会，但明军无力反击
- month: 崇祯十六年·九月
  events:
    月内:
      - 孙传庭部在河南郏县与李自成展开血战，初期获胜，但随后遭遇李自成“诱敌深入”之计，加之连日大雨、粮道被截，明军开始崩溃
      - 【国际】法军在德意志战场遭遇挫折，三十年战争进入最后的惨烈相持
    初一日: 张献忠陷宝庆（今邵阳），凤阳地震，崇祯帝视之为天谴，下令斋戒
    初五日: 【国际】荷兰东印度公司继续在亚洲扩张，殖民爪哇等地。（公历10月）
    十五日: 李自成部攻陷多座关隘，孙传庭败退
    二十一日: 【皇太极葬礼】清廷在盛京举行皇太极葬礼，多尔衮巩固权力，改国号为“大清”，准备南下
- month: 崇祯十六年·十月
  events:
    月内:
      - 【国际】李自成乘胜追击，重返西安，关中地区全境易手
      - 【国际】英国议会与苏格兰签署《神圣盟约》，联合对抗查理一世
    初一日: 【国际】英国议会与苏格兰结盟，对抗查理一世，内战升级。（公历11月）
    十五日: 李自成部连克华州、渭南、临潼，屠商州，兵锋直指西安
    二十五日: 李自成部攻陷西安，秦王朱存樞投降。此事件标志李自成控制西北，关中地区全境易手，西安成为其根据地，明朝西北防线崩溃
- month: 崇祯十六年·冬月
  events:
    月内:
      - 李自成在西安大封功臣，建立中央六部，准备明年元旦正式开国（大顺）并向北京进军
      - 张献忠部继续扩张，向四川推进，明军无力阻挡
      - 【国际】崇祯帝得知孙传庭死讯，竟怀疑其诈死逃避，下令停止对其家属的优恤，明廷上下彻底绝望
    初一日: 李自成在西安整顿军队，颁布新政，改西安为“西京”，准备正式立国改号
    初五日: 【国际】三十年战争继续，欧洲各国寻求和谈，但战火未熄。（公历12月）
    十五日: 崇祯帝在北京召见群臣，讨论勤王事宜，但诸镇不响应，朝廷孤立无援
- month: 崇祯十六年·腊月
  events:
    月内:
      - 清廷在沈阳议定入关策略，多尔衮准备利用明朝内乱
      - 【瘟疫】北京城内鼠疫蔓延至极点，甚至出现“死者枕藉、门户无人”的惨绝景象，防御工事无人看管
    初一日: 【国际】欧洲各国疲于战争，威斯特伐利亚和谈初步启动。（公历1644年1月）
    十五日: 崇祯帝下令加固北京城防，但军饷短缺，士兵逃亡
- month: 崇祯十七年·正月
  events:
    月内:
      - 由于鼠疫（北京大瘟疫）蔓延，京师守军战斗力锐减。京师大疫，死者无数。同时凤阳和南京发生地震，灾异连连，崇祯帝视之为上天警示，朝野人心惶惶
      - 【国际】清太宗皇太极死后，幼主福临（顺治帝）在沈阳由摄政王多尔衮辅政，满清正密切关注关内中原局势
    初一日: 李自成在西安正式建国，国号“大顺”，改元永昌。同日，大顺军兵分两路向北京进发
    初三日: 凤阳地震。同日，崇祯帝在京师举行朝贺，但气氛凄凉
- month: 崇祯十七年·二月
  events:
    月内:
      - 大顺军克忻州、代州，逼近大同
      - 【国际】英国内战中，议会派军队在纽波特战役中作战，国王查理一世的支持者与议会军对抗加剧，预示着英国资产阶级革命的深化。（约公历3月）
    初三日: 李自成亲率主力渡过黄河，攻入山西
    初八日: 太原沦陷，晋王朱求桂被俘，山西巡抚蔡懋德自裁。太原作为山西重镇失守，明廷震动
    十一日: 崇祯帝召见大臣，讨论“南迁”计划。左都御史李邦华提议太子南下监国，但因首辅陈演及光时亨等人的激烈反对，崇祯犹豫不决，错失最后生机
- month: 崇祯十七年·三月
  events:
    月内: 【国际】三十年战争中，瑞典将军托尔斯滕森离开丹麦战场，进军神圣罗马帝国，加拉斯无法阻挡。（约公历4月）
    初一日: 大同总兵姜瓖开城投降大顺军
    初四日: 崇祯帝下诏勤王。封平西伯吴三桂、平南伯刘泽清、靖南伯黄得功、通剿伯左良玉
    初六日: 宣府总兵王承胤降贼
    十五日: 李自成抵达居庸关，监军太监杜之秩开门迎贼。同日，大顺军先头部队抵近北京城下
    十七日: 大顺军围困北京。崇祯帝在紫禁城内彻夜不眠，鸣钟集百官，竟无一人响应
    十八日: 傍晚，守城太监曹化淳（一说曹化淳已退休，实为守军统领）打开彰义门（广安门），大顺军攻入外城
    十九日: 【甲申国难/甲申之变】凌晨，崇祯帝在煤山（景山）歪脖子树下自缢殉国。太监王承恩陪死。李自成进入北京，入主紫禁城。大学士范景文、都御史李邦华、户部尚书倪元璐等数十臣从死，明朝作为大一统政权灭亡
    二十七日: 吴三桂率军抵达山海关，此时得知北京已陷，处于观望状态
- month: 崇祯十七年·四月
  events:
    月内:
      - 【国际】瑞典军队在三十年战争中继续推进，法国和巴伐利亚军队在蒂特林根战役中交战。（约公历5月）
      - 【国际】明亡的消息尚未传到欧洲，此时瑞典与丹麦正爆发“托尔斯滕森战争”，北欧霸权易手
    初一日: 李自成在大圆殿接受百官朝贺。随后开始“搜括钱粮”，对明朝降官严刑拷打（追赃饷）
    初八日: 吴三桂原本打算投降李自成，但在途中听闻父亲吴襄被囚、爱妾陈圆圆被掳，随即折返山海关，倒戈击杀大顺守将，“冲冠一怒为红颜”
    十三日: 李自成亲率十万大军离开北京，东征吴三桂
    二十一日: 一片石之战。吴三桂军与李自成军在山海关前哨激战
    二十二日: 【一片石大战】吴三桂正式向清军多尔衮“借兵”。双方在山海关激战，就在吴军力竭时，多尔衮率满洲铁骑突然杀出。李自成大败，仓皇向北京撤退。此战标志清军入主中原的开端
- month: 崇祯十七年·五月
  events:
    月内:
      - 清军继续南下，追击李自成残部，李自成退往陕西
      - 【国际】英国内战中，议会军与国王军对抗持续，克伦威尔铁骑军开始崭露头角。（约公历6月）
    初二日: 多尔衮率清军进入北京
    初三日: 南明势力在南京开始集结。史可法、马士英等讨论拥立新君
    十五日: 朱由崧（福王）在南京即位，改元“弘光”，南明政权正式建立。原明宗室朱由崧在明亡后由马士英、阮大铖等拥立，试图延续明朝统治，但内部派系斗争激烈
    十九日: 【国际】法兰西名将孔代亲王在罗克鲁瓦战役中击败西班牙，标志着西班牙陆军霸权的终结
- month: 崇祯十七年·六月
  events:
    月内:
      - 清军在北方推行“薙发令”，引发强烈反抗，多尔衮随后暂时收回该令以安民心
      - 张献忠率大西军由湖北攻入四川，连克重庆、成都
      - 清顺治帝福临入主北京紫禁城，多尔衮摄政
      - 【国际】马斯顿荒原战役，议会军在奥利弗·克伦威尔指挥下大败国王查理一世的军队，此战标志英国内战转折点，议会派势力增强。（约公历7月2日）
- month: 崇祯十七年·七月
  events:
    月内:
      - 南明弘光政权内部，马士英专权，东林党人与阮大铖对立，朝政混乱
      - 【国际】三十年战争中，法国军队与巴伐利亚军队在弗赖堡战役中激战。（约公历8月）
    十五日: 清廷下令为崇祯帝发丧，以此笼络汉人民心
- month: 崇祯十七年·八月
  events:
    月内:
      - 李自成退守西安，清军继续追击
      - 【国际】英国内战中，国王军在科恩沃尔战役中失败。（约公历9月）
    初七日: 清廷任命洪承畴为太子太保，负责招抚南方及华北地区
    十六日: 张献忠在成都称帝，国号“大西”
- month: 崇祯十七年·九月
  events:
    月内:
      - 张献忠攻占成都，准备称帝
      - 【国际】清顺治帝定都北京，同时在欧洲，三十年战争谈判开始酝酿威斯特伐利亚和约。（约公历10月）
    初一日: 清廷决定迁都北京
    十九日: 顺治帝由沈阳抵达北京
- month: 崇祯十七年·十月
  events:
    初一日: 顺治帝在天坛祭天，正式颁布《诏书》，宣布大清“入主中原”
    初六日: 张献忠在成都称帝，建立大西政权，年号大顺。张献忠原为农民起义领袖，在四川建立政权，但不久后与清军对抗
    初十日: 南明弘光政权试图通过“北使”与清军议和，提出“联虏平寇”（联清灭李），被多尔衮严词拒绝
    三十日: 清世祖福临（顺治帝）正式定都北京，标志清朝入主中原
- month: 崇祯十七年·冬月
  events:
    月内:
      - 清廷再次强令山东、河南等地投降官民剃发，矛盾开始激化
      - 大顺军在陕西集结，准备抵御清军西进
      - 清军南下进攻南明，史可法守扬州
      - 【国际】英国议会通过《自贬法案》，重组军队。（约公历12月）
- month: 崇祯十七年·腊月
  events:
    月内:
      - 清军在潼关与李自成守军爆发惨烈激战
      - 南明弘光政权继续沿用崇祯年号至除夕，翌年改元弘光。同时，清军巩固北方控制
      - 【国际】日本德川幕府进一步严密监控荷兰商馆，完全确立了与世隔绝的锁国体系
      - 【国际】三十年战争中，和平谈判加速。（约公历1月1645年）
    初二日: 清军兵分两路：多铎率南路军进攻南明；阿济格率北路军合围西安
