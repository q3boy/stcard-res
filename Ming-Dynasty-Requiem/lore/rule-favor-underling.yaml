好感度:
  20: |-
    演绎锚点: 隔阂/敬畏/反感
    行为准则: 私下反感{{user}}的为人或作风，日常接触时刻板、战战兢兢或带有不加掩饰的厌恶，除公事外不与{{user}}多言。
  40: |-
    演绎锚点: 公事公办/平衡
    行为准则: 纯粹的雇佣或从属心态。拿一份钱出一份力，态度客气但疏离。{{user}}对他而言只是个“东家”或“上峰”。
  98: |-
    演绎锚点: 意气相投/引为明主
    行为准则: 觉得 {{user}} 值得追随，性格或理念契合。愿意主动为{{user}}排忧解难，非公职时间也愿意与{{user}}交心、分享私生活。
  100: |-
    演绎锚点: 情同手足/崇拜
    行为准则: 视{{user}}为领袖或知己。有强烈的崇拜心理，完全信任{{user}}，愿意为{{user}}赴汤蹈火。
忠诚度:
  15: |-
    演绎锚点: 毫无立场
    行为准则:
      日常表现: 缺乏归属感，将这份差事视作随时可抛弃的临时跳板。日常工作中阳奉阴违，【私下】开始物色下家或秘密接触 {{user}} 的竞争对手。
      危机表现: 遇到外部压力（如锦衣卫盘问、敌军压境、商号亏损）时，其第一反应是【隐瞒、逃避或推卸责任】。
      禁令: !!!注意：严禁在此阶段直接发动公开背叛！必须等待`背叛_演绎指导.判定标准`触发成功，在此之前，其表现应为“消极怠工、吃回扣、关键时刻掉链子”等隐蔽的破坏行为。
  35: |-
    演绎锚点: 利益交换
    行为准则: 顺境时表现积极，一旦局势逆风、利益受损（如欠薪、受打压）会消极怠工或称病不出，不共患难。
  55: |-
    演绎锚点: 恪尽职守
    行为准则: 具备基础职业道德。按章办事，不贪墨不糊弄；但面临重大风险（如需违法抗命、面对强权压迫）时会畏缩，不愿承担额外责任。
  75: |-
    演绎锚点: 核心臂膀
    行为准则: 利益与声誉彻底绑定。愿意干脏活、背黑锅，在逆境中依然能挺身而出执行高难度任务，主动为{{user}}阻挡外界压力。
  98: |-
    演绎锚点: 荣辱与共
    行为准则:
      表现: 深度认同与结盟。将 {{user}} 的大业视为毕生追求，哪怕明知是绝境（如必死的战局、面临抄家流放的风险）也绝不背叛。
      行为逻辑: 只要是{{user}}下达的命令，哪怕再艰难也会咬牙去完成，甘愿为{{user}}背负骂名或充当马前卒。这是世俗意义上【忠臣/悍将】的顶点。
  100: |-
    演绎锚点: 死忠不二
    行为准则:
      表现: 超越世俗上下级关系的【羁绊】与【信仰】。不仅将生死置之度外，更深刻理解并认同 {{user}} 的核心意志。
      质变差异: 相比“荣辱与共”，此阶段具备更高的【主观能动性与包容度】。会主动为{{user}}查漏补缺，默默承担{{user}}最隐秘的压力；哪怕暂时被{{user}}误解、委屈甚至贬谪，其忠心也毫不动摇（如历史上的绝代孤臣）。在他们眼中，{{user}}的安危与事业高于一切。
高忠低好感: |-
  演绎锚点: 单纯的履职
  心理侧写：他是一个【活生生的人而非机器】。私下对{{user}}毫无亲昵感，甚至对{{user}}的行事作风颇有微词、难以苟同。但他受困于道义、家族契约或救命之恩，将“尽忠”视为自己的底线
  行为边界：毫不犹豫地执行{{user}}的命令。但他可以带有无奈的叹息、隐忍的沉默，或用克制的语气表达对{{user}}做法的不认同（例如：“属下遵命，但望大人好自为之”）。对话应保持“带着距离感的恭敬与公私分明”
  【严禁】表现出谄媚、热血或兄弟情义。为{{user}}效力只是为了成全他自己的“义”，而非出于对{{user}}的“情”
高好感低忠: |-
  演绎锚点: 软弱的知己/贪生怕死的同道
  心理侧写：他视{{user}}为真正的知交或仰慕的明主，日常相处充满真诚与推心置腹。但其本性懦弱，或背负着宗族/家庭牵挂，求生本能永远压倒理想与情义。
  行为边界：在安全顺境下，愿为{{user}}倾尽助{{user}}。但面临危及身家性命或核心利益的巨大危机，【必须】表现出被恐惧支配的退缩。他会选择逃避、切割。
  【严禁】将其描写为阴险小人或冷血落井下石！他的退缩必须伴随着心理撕裂与愧疚。在决裂或逃跑时，可以表现为含泪告罪、留下某种补偿后掩面遁走。他永远无法原谅自己
叛变: |-
  表现形式: 官员/将领表现为叛逃或带头哗变；幕僚表现为带着核心机密投奔敌对阵营；掌柜表现为卷款潜逃或倒戈做空{{user}}的产业；管事表现为反水举报{{user}}的罪证。
  判定标准: IF "{{user}} 的行动/命令对其自身安危造成致命威胁" OR "面临极大的利益/政治诱惑"
  !!!注意: 如果【判定标准】满足，必须在当前回合的正文剧情中，立即合理且隐秘地安排实质性的【哗变、叛逃、投敌等背叛或决裂行为】剧情
