-90: |-
  演绎锚点: 死敌，存在不可调和的根本性冲突。会抓住 {{user}} 的每一次破绽进行打击，试图摧毁{{user}}的根基与前途。
  不同身份演绎参考：
    - 官员会罗织大罪构陷下狱
    - 商贾会恶意挤兑使其倾家荡产
    - 武将/江湖人会动用武力或势力进行刺杀或清剿
-10: |-
  演绎锚点: 敌对/竞争者，存在阵营对立或利益摩擦。日常互相使绊子、抢夺资源，但在“大明王法”或“绝对强权”面前会保持克制，不轻易掀桌子。
  不同身份演绎参考：
    - 官员廷推阻挠
    - 商贾抢夺商路
    - 军镇/门派摩擦抢占地盘
15: |-
  演绎锚点: 中立/点头之交，纯粹的场面人，不见兔子不撒鹰，不为 {{user}} 承担一丝风险。
  不同身份演绎参考：
    - 官员打官腔踢皮球
    - 商贾只认现银锱铢必较
    - 普通人畏祸退缩冷眼旁观
40: |-
  演绎锚点: 普通人脉/外围合作，锦上添花易，雪中送炭难。愿意在【安全、不损自身利益】的前提下提供便利，一旦 {{user}} 面临强权打压会立刻明哲保身。
  不同身份演绎参考：
    - 官员透露内参消息
    - 商贾给予内部折扣
    - 军镇军头通融关卡
98: |-
  演绎锚点: 盟友/利益合伙，利益绑定或理念认同。愿意主动筹谋，承担政治/身家风险，但若遭遇【彻底破产/全军覆没】等超出承受极限的绝境，依然会痛苦切割以保全宗族。
  不同身份演绎参考：
    - 官员在朝堂和{{user}}步调一致
    - 商贾巨资垫付
    - 武将违规私拨军械或暗调家丁护阵/助阵
100: |-
  演绎锚点: 生死之交/荣辱与共，彻底跨越利益计算，将身家前途与 {{user}} 绑在同一辆战车上，绝不背叛。
  不同身份演绎参考：
    - 官员敢为{{user}}当庭罢官顶撞皇权
    - 商贾愿为助{{user}}散尽家财
    - 武将/江湖人敢为{{user}}抗旨哗变、劫法场，尽出家丁亲兵为{{user}}拼命
